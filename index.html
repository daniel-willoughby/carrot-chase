// ── GROUPS PAGE ──────────────────────────────────────────────────────────────
function GroupsPage({ setPage, setMemberGroupFilter, runners, setRunners }) {
  const isMobile = useIsMobile();
  const [groups, setGroups] = useState(GROUPS);
  const [showNewModal, setShowNewModal] = useState(false);
  const [editGroup, setEditGroup] = useState(null);
  const [newForm, setNewForm] = useState({ name: '', type: 'Running Club', lead: '' });
  const [leadInvites, setLeadInvites] = useState(SEED_LEAD_INVITES);
  const [showInviteModal, setShowInviteModal] = useState(false);
  const [inviteForm, setInviteForm] = useState({ email: '', name: '', groups: [] });
  const [inviteSent, setInviteSent] = useState(false);
  const [mergeMode, setMergeMode] = useState(false);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [showMergeModal, setShowMergeModal] = useState(false);
  const [mergeName, setMergeName] = useState('');

  const GROUP_TYPES = ['Running Club', 'Breakfast Club', 'PE Class', 'After-School Club', 'Cross Country'];

  function handleSendLeadInvite() {
    if (!inviteForm.email.trim()) return;
    sfx.confirm();
    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    setLeadInvites(prev => [{ id: `li-${Date.now()}`, email: inviteForm.email.trim(), name: inviteForm.name.trim(), groups: inviteForm.groups, sentAt: today, status: 'sent' }, ...prev]);
    setInviteSent(true);
    setTimeout(() => { setInviteSent(false); setInviteForm({ email: '', name: '', groups: [] }); setShowInviteModal(false); }, 1600);
  }

  function inviteStatusBadge(status) {
    if (status === 'accepted') return { label: 'Accepted', bg: C.successLight, color: C.success };
    if (status === 'expired')  return { label: 'Expired',  bg: C.dangerLight,  color: C.danger  };
    return { label: 'Sent', bg: C.blueLight, color: C.blue };
  }

  function toggleSelect(id) {
    setSelectedIds(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }

  function openMergeModal() {
    const sel = groups.filter(g => selectedIds.has(g.id));
    const biggest = sel.reduce((a, b) => (a.members >= b.members ? a : b), sel[0]);
    setMergeName(biggest?.name || '');
    setShowMergeModal(true);
  }

  function cancelMerge() {
    setMergeMode(false);
    setSelectedIds(new Set());
  }

  function handleMerge() {
    if (!mergeName.trim() || selectedIds.size < 2) return;
    sfx.confirm();
    const selectedGroups = groups.filter(g => selectedIds.has(g.id));
    const selectedNames = new Set(selectedGroups.map(g => g.name));
    const targetName = mergeName.trim();
    const totalMembers = selectedGroups.reduce((sum, g) => sum + (g.members || 0), 0);
    const biggest = selectedGroups.reduce((a, b) => (a.members >= b.members ? a : b), selectedGroups[0]);
    // Reassign runners: swap any matched group name for targetName (deduplicated)
    if (runners && setRunners) {
      setRunners(rs => rs.map(r => {
        const current = rGroups(r);
        const hasMatch = current.some(n => selectedNames.has(n));
        if (!hasMatch) return r;
        const filtered = current.filter(n => !selectedNames.has(n));
        return { ...r, groups: [...filtered, targetName] };
      }));
    }
    // Replace selected group records with one merged group
    const mergedGroup = { ...biggest, id: Date.now(), name: targetName, members: totalMembers };
    setGroups(gs => [...gs.filter(g => !selectedIds.has(g.id)), mergedGroup]);
    setSelectedIds(new Set());
    setMergeMode(false);
    setShowMergeModal(false);
    setMergeName('');
    toast(`Merged into "${targetName}"`);
  }

  const Modal = ({ title, onClose, children }) => (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 500,
      background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      padding: '16px 16px', paddingTop: 'max(16px, 8vh)', overflowY: 'auto',
    }} onClick={onClose}>
      <div style={{
        background: C.white, borderRadius: 20, padding: 28, width: '100%', maxWidth: 420,
        boxShadow: C.shadowLg,
      }} onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div style={{ fontWeight: 800, fontSize: 18 }}>{title}</div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: C.muted }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );

  const Field = ({ label, value, onChange, placeholder, capitalize = 'off', type = 'text' }) => (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>{label}</label>
      <input
        type={type}
        value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        autoCapitalize={capitalize}
        style={{
          width: '100%', padding: '11px 14px', borderRadius: 10,
          border: `1.5px solid ${C.border}`, fontSize: 14,
          fontFamily: 'Satoshi, sans-serif', outline: 'none', background: C.white,
        }}
      />
    </div>
  );

  return (
    <div className="fade-in">
      {/* Invite Lead modal */}
      {showInviteModal && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '16px 16px', paddingTop: 'max(16px, 8vh)', overflowY: 'auto' }}>
          <div style={{ background: C.white, borderRadius: 20, padding: 28, width: '100%', maxWidth: 420, boxShadow: C.shadowLg }}>
            {inviteSent ? (
              <div style={{ textAlign: 'center', padding: '20px 0' }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>✉️</div>
                <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.02em', marginBottom: 6 }}>Invitation sent!</div>
                <div style={{ fontSize: 14, color: C.muted }}>A setup link has been sent to {inviteForm.email}. It expires in 72 hours.</div>
              </div>
            ) : (
              <>
                <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.02em', marginBottom: 4 }}>Invite Lead</div>
                <div style={{ fontSize: 13, color: C.muted, marginBottom: 20 }}>They'll receive an email with a setup link (expires in 72 hours).</div>
                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Email address *</label>
                  <input type="email" value={inviteForm.email} onChange={e => setInviteForm(f => ({ ...f, email: e.target.value }))} placeholder="lead@school.co.uk" autoCapitalize="none" style={{ width: '100%', padding: '10px 14px', borderRadius: 12, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi', background: C.white, boxSizing: 'border-box' }} />
                </div>
                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Name (optional)</label>
                  <input type="text" value={inviteForm.name} onChange={e => setInviteForm(f => ({ ...f, name: e.target.value }))} placeholder="e.g. James Carter" autoCapitalize="words" style={{ width: '100%', padding: '10px 14px', borderRadius: 12, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi', background: C.white, boxSizing: 'border-box' }} />
                </div>
                <div style={{ marginBottom: 20 }}>
                  <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 8, color: C.muted }}>Assign to group(s) (optional)</label>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {groups.filter(g => !g.archived).map(g => {
                      const checked = inviteForm.groups.includes(g.name);
                      return (
                        <label key={g.id} style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', fontSize: 14 }}>
                          <input type="checkbox" checked={checked}
                            onChange={() => setInviteForm(f => ({
                              ...f,
                              groups: checked ? f.groups.filter(x => x !== g.name) : [...f.groups, g.name],
                            }))}
                            style={{ width: 16, height: 16, accentColor: C.orange, cursor: 'pointer' }}
                          />
                          <span style={{ fontWeight: checked ? 600 : 400 }}>{g.name}</span>
                          <span style={{ fontSize: 12, color: C.muted }}>({g.type})</span>
                        </label>
                      );
                    })}
                  </div>
                </div>
                <div style={{ display: 'flex', gap: 10 }}>
                  <Button style={{ flex: 1 }} disabled={!inviteForm.email.trim()} onClick={handleSendLeadInvite}>Send Invite</Button>
                  <Button variant="secondary" style={{ flex: 1 }} onClick={() => { setShowInviteModal(false); setInviteForm({ email: '', name: '', groups: [] }); }}>Cancel</Button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: isMobile ? 'flex-start' : 'center', flexWrap: 'wrap', gap: 10, marginBottom: isMobile ? 16 : 28 }}>
        <div>
          <h1 style={{ fontSize: isMobile ? 22 : 26, fontWeight: 800 }}>Groups</h1>
          <p style={{ color: C.muted, marginTop: 4, fontSize: isMobile ? 13 : 14 }}>Manage your running groups</p>
        </div>
        <div style={{ display: 'flex', gap: 8, flexShrink: 0, flexWrap: 'wrap', alignItems: 'center' }}>
          {mergeMode ? (
            <>
              <span style={{ fontSize: 13, color: C.muted, fontWeight: 500 }}>
                {selectedIds.size < 2 ? 'Select 2 or more groups' : `${selectedIds.size} selected`}
              </span>
              {selectedIds.size >= 2 && (
                <Button size="sm" style={{ background: C.purple, boxShadow: `0 2px 8px rgba(124,58,237,0.3)` }} onClick={() => { sfx.click(); openMergeModal(); }}>
                  Merge {selectedIds.size} →
                </Button>
              )}
              <Button size="sm" variant="outline" onClick={() => { sfx.dismiss(); cancelMerge(); }}>Cancel</Button>
            </>
          ) : (
            <>
              <Button size="sm" variant="outline" onClick={() => { sfx.click(); setMergeMode(true); }}>⇢ Merge groups</Button>
              <Button variant="outline" size="sm" onClick={() => setShowInviteModal(true)}>{isMobile ? '✉️ Invite' : '✉️ Invite Lead'}</Button>
              <Button size="sm" onClick={() => { setEditGroup(null); setNewForm({ name: '', type: 'Running Club', lead: '' }); setShowNewModal(true); }}>+ New Group</Button>
            </>
          )}
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fill,minmax(300px,1fr))', gap: isMobile ? 12 : 20 }}>
        {groups.filter(g => !g.archived).map(g => {
          const isSelected = selectedIds.has(g.id);
          return (
          <Card key={g.id}
            onClick={mergeMode ? () => toggleSelect(g.id) : undefined}
            style={{
              ...(mergeMode ? { cursor: 'pointer', userSelect: 'none' } : {}),
              ...(isSelected ? { border: `2px solid ${C.purple}`, boxShadow: `0 0 0 3px ${_isDark ? 'rgba(167,139,250,0.15)' : 'rgba(124,58,237,0.08)'}` } : {}),
              ...(mergeMode && !isSelected ? { opacity: 0.75 } : {}),
            }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                {mergeMode && (
                  <input
                    type="checkbox"
                    checked={isSelected}
                    onChange={() => toggleSelect(g.id)}
                    onClick={e => e.stopPropagation()}
                    style={{ width: 16, height: 16, accentColor: C.purple, cursor: 'pointer', flexShrink: 0 }}
                  />
                )}
                <div style={{
                  width: 44, height: 44, borderRadius: 12, background: C.orangeLight,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22,
                }}>{g.name.charAt(0)}</div>
              </div>
              <Badge label={`${g.members} runners`} bg={C.orangeLight} color={C.orange} />
            </div>
            <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: '-0.01em', marginBottom: 4 }}>{g.name}</div>
            <div style={{ fontSize: 12, color: C.muted, marginBottom: 12 }}>
              {g.type}{g.lead ? ` · Lead: ${g.lead}` : ''}
            </div>
            <div style={{ marginBottom: 12 }}>
              <AvatarStack runners={RUNNERS.filter(r => rGroups(r).includes(g.name))} />
            </div>
            <div style={{ display: 'flex', gap: 20, marginBottom: 16 }}>
              <div>
                <div style={{ fontSize: 11, color: C.muted }}>Last event</div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{g.lastEvent}</div>
              </div>
              <div>
                <div style={{ fontSize: 11, color: C.muted }}>Next event</div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{g.nextEvent}</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <Button size="sm" variant="outline" onClick={e => { e.stopPropagation(); sfx.click(); setMemberGroupFilter(g.name); setPage('members'); }}>
                View members
              </Button>
              {!mergeMode && (
                <Button size="sm" variant="secondary" onClick={e => { e.stopPropagation(); setShowNewModal(false); setEditGroup({ ...g }); }}>
                  Edit
                </Button>
              )}
            </div>
          </Card>
          );
        })}
      </div>

      {/* Merge Modal */}
      {showMergeModal && (() => {
        const sel = groups.filter(g => selectedIds.has(g.id));
        const totalMembers = sel.reduce((sum, g) => sum + (g.members || 0), 0);
        return (
          <Modal title="Merge groups" onClose={() => setShowMergeModal(false)}>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 13, color: C.muted, marginBottom: 10 }}>Merging {sel.length} groups ({totalMembers} runners total)</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 16 }}>
                {sel.map(g => (
                  <div key={g.id} style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '8px 12px', borderRadius: 10,
                    background: C.bgSubtle, border: `1px solid ${C.border}`,
                  }}>
                    <span style={{ fontWeight: 600, fontSize: 14 }}>{g.name}</span>
                    <span style={{ fontSize: 12, color: C.muted }}>{g.members} runners</span>
                  </div>
                ))}
              </div>
              <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Merged group name</label>
              <input
                type="text"
                value={mergeName}
                onChange={e => setMergeName(e.target.value)}
                autoCapitalize="words"
                style={{
                  width: '100%', padding: '11px 14px', borderRadius: 10,
                  border: `1.5px solid ${C.border}`, fontSize: 14,
                  fontFamily: 'Satoshi, sans-serif', outline: 'none',
                  background: C.white, boxSizing: 'border-box',
                }}
              />
              <div style={{ fontSize: 12, color: C.muted, marginTop: 8 }}>
                ⚠ The source groups will be removed. All runners will be moved to the merged group.
              </div>
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <Button variant="secondary" onClick={() => setShowMergeModal(false)}>Cancel</Button>
              <Button
                disabled={!mergeName.trim()}
                style={{ background: C.purple, boxShadow: `0 2px 8px rgba(124,58,237,0.25)` }}
                onClick={handleMerge}
              >
                Merge groups
              </Button>
            </div>
          </Modal>
        );
      })()}

      {/* New Group Modal */}
      {showNewModal && (
        <Modal title="New Group" onClose={() => setShowNewModal(false)}>
          <Field label="Group name" value={newForm.name} onChange={v => setNewForm(f => ({ ...f, name: v }))} placeholder="e.g. Year 4 Running Club" capitalize="words" />
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Type</label>
            <select
              value={newForm.type}
              onChange={e => setNewForm(f => ({ ...f, type: e.target.value }))}
              style={{ width: '100%', padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi', background: C.white }}
            >
              {GROUP_TYPES.map(t => <option key={t}>{t}</option>)}
            </select>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Lead (optional)</label>
            <select value={newForm.lead} onChange={e => setNewForm(f => ({ ...f, lead: e.target.value }))}
              style={{ width: '100%', padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi', background: C.white }}>
              <option value="">— Unassigned —</option>
              {leadInvites.filter(i => i.status === 'accepted').map(i => (
                <option key={i.id} value={i.name || i.email}>{i.name || i.email}{i.groups?.length > 0 ? ` (${i.groups.join(', ')})` : ''}</option>
              ))}
            </select>
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
            <Button variant="secondary" onClick={() => setShowNewModal(false)}>Cancel</Button>
            <Button
              disabled={!newForm.name.trim()}
              onClick={() => {
                if (!newForm.name.trim()) return;
                sfx.confirm();
                setGroups(gs => [...gs, {
                  id: Date.now(), name: newForm.name.trim(), type: newForm.type,
                  lead: newForm.lead || '', members: 0, lastEvent: '—', nextEvent: '—',
                }]);
                setShowNewModal(false);
                setNewForm({ name: '', type: 'Running Club', lead: '' });
              }}
            >
              Create Group
            </Button>
          </div>
        </Modal>
      )}

      {/* Edit Group Modal */}
      {editGroup && (
        <Modal title="Edit Group" onClose={() => setEditGroup(null)}>
          <Field label="Group name" value={editGroup.name} onChange={v => setEditGroup(g => ({ ...g, name: v }))} placeholder="Group name" capitalize="words" />
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Type</label>
            <select
              value={editGroup.type || 'Running Club'}
              onChange={e => setEditGroup(g => ({ ...g, type: e.target.value }))}
              style={{ width: '100%', padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi', background: C.white }}
            >
              {GROUP_TYPES.map(t => <option key={t}>{t}</option>)}
            </select>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Lead</label>
            <select value={editGroup.lead || ''} onChange={e => setEditGroup(g => ({ ...g, lead: e.target.value }))}
              style={{ width: '100%', padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi', background: C.white }}>
              <option value="">— Unassigned —</option>
              {leadInvites.filter(i => i.status === 'accepted').map(i => (
                <option key={i.id} value={i.name || i.email}>{i.name || i.email}</option>
              ))}
            </select>
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'space-between', marginTop: 8 }}>
            <Button variant="danger" onClick={() => {
              if (!window.confirm(`Archive "${editGroup.name}"? The group will be hidden but its event history is preserved.`)) return;
              sfx.dismiss();
              setGroups(gs => gs.map(g => g.id === editGroup.id ? { ...g, archived: true } : g));
              setEditGroup(null);
            }}>
              Archive
            </Button>
            <div style={{ display: 'flex', gap: 10 }}>
              <Button variant="secondary" onClick={() => setEditGroup(null)}>Cancel</Button>
              <Button
                disabled={!editGroup.name.trim()}
                onClick={() => {
                  sfx.confirm();
                  setGroups(gs => gs.map(g => g.id === editGroup.id ? { ...g, name: editGroup.name, type: editGroup.type, lead: editGroup.lead || '' } : g));
                  setEditGroup(null);
                }}
              >
                Save Changes
              </Button>
            </div>
          </div>
        </Modal>
      )}

      {/* Archived groups */}
      {groups.some(g => g.archived) && (
        <div style={{ marginTop: 24 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: C.muted, marginBottom: 10 }}>Archived Groups</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {groups.filter(g => g.archived).map(g => (
              <div key={g.id} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '10px 16px', borderRadius: 10, background: C.bg, border: `1px solid ${C.border}`, opacity: 0.7,
              }}>
                <div>
                  <span style={{ fontWeight: 600, fontSize: 14, color: C.muted }}>{g.name}</span>
                  <span style={{ fontSize: 12, color: C.muted, marginLeft: 10 }}>{g.type}</span>
                </div>
                <button onClick={() => setGroups(gs => gs.map(x => x.id === g.id ? { ...x, archived: false } : x))}
                  style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8, padding: '4px 12px', fontSize: 12, cursor: 'pointer', fontFamily: 'Satoshi', color: C.text }}>
                  Restore
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Leads section */}
      <div style={{ marginTop: isMobile ? 28 : 36 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16 }}>Leads</div>
          <span style={{ fontSize: 12, color: C.muted }}>{leadInvites.filter(i => i.status === 'sent').length} pending invite{leadInvites.filter(i => i.status === 'sent').length !== 1 ? 's' : ''}</span>
        </div>
        <Card style={{ padding: 0 }}>
          {leadInvites.length === 0 && (
            <EmptyState icon="members" heading="No leads invited yet" sub='Use "Invite Lead" to add a group lead.' />
          )}
          {leadInvites.map(inv => {
            const s = inviteStatusBadge(inv.status);
            return (
              <div key={inv.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 20px', borderBottom: `1px solid ${C.border}`, flexWrap: isMobile ? 'wrap' : 'nowrap' }}>
                <div style={{ width: 36, height: 36, borderRadius: '50%', background: C.orangeLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 700, color: C.orange, flexShrink: 0 }}>
                  {(inv.name || inv.email)[0].toUpperCase()}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{inv.name || <span style={{ color: C.muted, fontStyle: 'italic' }}>Name not provided</span>}</div>
                  <div style={{ fontSize: 12, color: C.muted, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {inv.email}{(inv.groups?.length > 0 || inv.group) ? ` · ${inv.groups?.join(', ') || inv.group}` : ''}
                  </div>
                </div>
                <Badge label={s.label} bg={s.bg} color={s.color} />
                {inv.status !== 'accepted' && (
                  <button onClick={() => {
                    sfx.click();
                    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                    setLeadInvites(prev => prev.map(i => i.id === inv.id ? { ...i, status: 'sent', sentAt: today } : i));
                  }} style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8, padding: '4px 10px', fontSize: 12, cursor: 'pointer', color: C.text, fontFamily: 'Satoshi', flexShrink: 0 }}>Resend</button>
                )}
                {inv.status !== 'accepted' && (
                  <button onClick={() => { sfx.dismiss(); setLeadInvites(prev => prev.filter(i => i.id !== inv.id)); }} style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8, padding: '4px 10px', fontSize: 12, cursor: 'pointer', color: C.danger, fontFamily: 'Satoshi', flexShrink: 0 }}>Revoke</button>
                )}
              </div>
            );
          })}
        </Card>
      </div>
    </div>
  );
}

// ── MEMBERS PAGE ─────────────────────────────────────────────────────────────
function MembersPage({ setPage, setSelectedRunner, groupFilter, setGroupFilter, runners, setRunners }) {
  const [search, setSearch] = useState('');
  const [showAddModal, setShowAddModal] = useState(false);
  const [showCSVModal, setShowCSVModal] = useState(false);
  const [showCSVGuide, setShowCSVGuide] = useState(false);
  const [csvPreview, setCsvPreview] = useState(null);
  const [addForm, setAddForm] = useState({ firstName: '', lastName: '', year: 'Year 5', group: 'Year 5 Running Club' });
  const [editRunner, setEditRunner] = useState(null);
  const [editForm, setEditForm] = useState({ name: '', group: '' });
  const csvRef = useRef(null);
  const isMobile = useIsMobile();

  function openEdit(r, e) {
    e.stopPropagation();
    setEditForm({ name: r.name, group: rGroups(r)[0] || '' });
    setEditRunner(r);
  }

  function handleEditSave() {
    if (!editForm.name.trim()) return;
    sfx.confirm();
    setRunners(runners.map(r => r.id === editRunner.id
      ? { ...r, name: editForm.name.trim(), groups: editForm.group ? [editForm.group] : [] }
      : r
    ));
    setEditRunner(null);
    toast('Runner updated');
  }

  const filtered = runners.filter(r => {
    const matchesSearch =
      r.name.toLowerCase().includes(search.toLowerCase()) ||
      r.id.toLowerCase().includes(search.toLowerCase()) ||
      rGroups(r).some(g => g.toLowerCase().includes(search.toLowerCase()));
    const matchesGroup = groupFilter ? rGroups(r).includes(groupFilter) : true;
    return matchesSearch && matchesGroup;
  });

  const inputStyle = { width: '100%', padding: '10px 14px', borderRadius: 12, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi', background: C.white, boxSizing: 'border-box' };

  function handleAddRunner() {
    if (!addForm.firstName.trim()) return;
    const name = `${addForm.firstName.trim()} ${addForm.lastName.trim()}`.trim();
    const nextNum = runners.length + 1;
    const id = `CC-${String(nextNum).padStart(4, '0')}`;
    const newRunner = { id, name, level: 99, pb: '—', groups: addForm.group ? [addForm.group] : [], streak: 0, points: 0, times: [420,420,420,420,420], badges: [] };
    sfx.confirm();
    setRunners([...runners, newRunner]);
    setAddForm({ firstName: '', lastName: '', year: 'Year 5', group: 'Year 5 Running Club' });
    setShowAddModal(false);
    toast(`${name} added`);
  }

  function downloadCSVTemplate() {
    const template = 'name,group,year\nEmma Johnson,Year 5 Running Club,Year 5\nOliver Smith,Year 6 Running Club,Year 6';
    const blob = new Blob([template], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'carrot-chase-runners-template.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function handleCSVFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length < 2) return;
      const headers = lines[0].toLowerCase().split(',').map(h => h.trim());
      const nameIdx = headers.indexOf('name');
      const groupIdx = headers.indexOf('group');
      const yearIdx = headers.indexOf('year');
      const parsed = lines.slice(1).map((line, rowIdx) => {
        const cols = line.split(',').map(c => c.trim());
        const name = nameIdx >= 0 ? cols[nameIdx] : cols[0] || '';
        const group = groupIdx >= 0 ? cols[groupIdx] : (cols[1] || 'Year 5 Running Club');
        const year = yearIdx >= 0 ? cols[yearIdx] : '';
        const errors = [];
        if (!name) errors.push('Missing name');
        if (!group) errors.push('Missing group');
        return { name: name || '—', group, year, row: rowIdx + 2, errors };
      });
      setCsvPreview(parsed);
      setShowCSVModal(true);
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function confirmCSVImport() {
    const validRows = csvPreview.filter(r => r.errors.length === 0);
    const newRunners = validRows.map((r, i) => ({
      id: `CC-${String(runners.length + i + 1).padStart(4, '0')}`,
      name: r.name, level: 99, pb: '—', groups: r.group ? [r.group] : [], streak: 0, points: 0, times: [420,420,420,420,420], badges: [],
    }));
    sfx.confirm();
    setRunners([...runners, ...newRunners]);
    setShowCSVModal(false); setCsvPreview(null);
    toast(`${newRunners.length} runner${newRunners.length !== 1 ? 's' : ''} imported`);
  }

  return (
    <div className="fade-in">
      {/* Hidden CSV file input */}
      <input ref={csvRef} type="file" accept=".csv" onChange={handleCSVFile} style={{ display: 'none' }} />

      {/* Add Runner Modal */}
      {showAddModal && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '64px 16px 16px', overflowY: 'auto' }}>
          <div style={{ background: C.white, borderRadius: 20, padding: 28, width: '100%', maxWidth: 400, boxShadow: C.shadowLg }}>
            <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.02em', marginBottom: 20 }}>Add Runner</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>First name</label>
                <input value={addForm.firstName} onChange={e => setAddForm(f => ({ ...f, firstName: e.target.value }))} placeholder="e.g. Emma" autoCapitalize="words" style={inputStyle} />
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Last name</label>
                <input value={addForm.lastName} onChange={e => setAddForm(f => ({ ...f, lastName: e.target.value }))} placeholder="e.g. Johnson" autoCapitalize="words" style={inputStyle} />
              </div>
            </div>
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Year group</label>
              <select value={addForm.year} onChange={e => setAddForm(f => ({ ...f, year: e.target.value }))} style={inputStyle}>
                {['Year 3','Year 4','Year 5','Year 6','Other'].map(y => <option key={y}>{y}</option>)}
              </select>
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Group</label>
              <select value={addForm.group} onChange={e => setAddForm(f => ({ ...f, group: e.target.value }))} style={inputStyle}>
                {['Year 5 Running Club','Year 6 Running Club','Breakfast Club','PE Class 4B'].map(g => <option key={g}>{g}</option>)}
              </select>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <Button style={{ flex: 1 }} disabled={!addForm.firstName.trim()} onClick={handleAddRunner}>Add Runner</Button>
              <Button variant="secondary" style={{ flex: 1 }} onClick={() => setShowAddModal(false)}>Cancel</Button>
            </div>
          </div>
        </div>
      )}

      {/* CSV Import Guide Modal */}
      {showCSVGuide && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '16px', paddingTop: 'max(16px, 8vh)', overflowY: 'auto' }}
          onClick={() => setShowCSVGuide(false)}>
          <div style={{ background: C.white, borderRadius: 20, padding: 28, width: '100%', maxWidth: 440, boxShadow: C.shadowLg }}
            onClick={e => e.stopPropagation()}>
            {/* Header */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <div>
                <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.02em' }}>Import runners via CSV</div>
                <div style={{ fontSize: 13, color: C.muted, marginTop: 2 }}>Add multiple runners at once from a spreadsheet</div>
              </div>
              <button onClick={() => setShowCSVGuide(false)} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: C.muted }}>✕</button>
            </div>

            {/* Steps */}
            {[
              {
                n: 1, icon: '⬇', title: 'Download the template',
                body: 'Start with our pre-formatted CSV template. It has the correct column headings already set up: name, group, and year.',
                action: <button onClick={() => { downloadCSVTemplate(); }} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: C.bg, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: '7px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'Satoshi, sans-serif', color: C.text }}>⬇ Download CSV Template</button>,
              },
              {
                n: 2, icon: '✏️', title: 'Fill in your runners',
                body: (<>
                  Open the file in Excel, Google Sheets, or Numbers and add one runner per row:
                  <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: '10px 12px', marginTop: 8, fontFamily: "'JetBrains Mono', monospace", fontSize: 12, lineHeight: 1.8 }}>
                    <div style={{ color: C.muted, fontWeight: 700 }}>name, group, year</div>
                    <div>Emma Johnson, Year 5 Running Club, Year 5</div>
                    <div>Oliver Smith, Year 6 Running Club, Year 6</div>
                  </div>
                  <div style={{ fontSize: 12, color: C.muted, marginTop: 8 }}>⚠ Every row must have a <strong>name</strong> and a <strong>group</strong>. Rows missing either will be skipped.</div>
                </>),
              },
              {
                n: 3, icon: '⬆', title: 'Upload your file',
                body: 'Save the file as CSV, then upload it below. You\'ll see a preview before anything is imported — you can review and confirm.',
                action: <button onClick={() => { setShowCSVGuide(false); csvRef.current?.click(); }} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: C.blue, color: C.white, border: 'none', borderRadius: 8, padding: '9px 18px', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Satoshi, sans-serif', boxShadow: '0 2px 8px rgba(37,99,235,0.3)' }}>⬆ Choose CSV file</button>,
              },
            ].map(step => (
              <div key={step.n} style={{ display: 'flex', gap: 14, marginBottom: 20 }}>
                <div style={{ width: 30, height: 30, borderRadius: '50%', background: C.blue, color: C.white, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 800, flexShrink: 0, marginTop: 1 }}>{step.n}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{step.title}</div>
                  <div style={{ fontSize: 13, color: C.textSecondary, lineHeight: 1.6 }}>{step.body}</div>
                  {step.action && <div style={{ marginTop: 10 }}>{step.action}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* CSV Preview Modal */}
      {showCSVModal && csvPreview && (() => {
        const validRows = csvPreview.filter(r => r.errors.length === 0);
        const errorRows = csvPreview.filter(r => r.errors.length > 0);
        return (
          <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '16px 16px', paddingTop: 'max(16px, 8vh)', overflowY: 'auto' }}>
            <div style={{ background: C.white, borderRadius: 20, padding: 28, width: '100%', maxWidth: 440, boxShadow: C.shadowLg, maxHeight: '80vh', overflowY: 'auto' }}>
              <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.02em', marginBottom: 6 }}>CSV Preview</div>
              <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
                <span style={{ background: C.successLight, color: C.success, borderRadius: 999, padding: '3px 10px', fontSize: 12, fontWeight: 700 }}>
                  ✓ {validRows.length} valid
                </span>
                {errorRows.length > 0 && (
                  <span style={{ background: C.dangerLight, color: C.danger, borderRadius: 999, padding: '3px 10px', fontSize: 12, fontWeight: 700 }}>
                    ✕ {errorRows.length} error{errorRows.length !== 1 ? 's' : ''} — will be skipped
                  </span>
                )}
              </div>
              {csvPreview.slice(0, 12).map((r, i) => {
                const hasError = r.errors.length > 0;
                return (
                  <div key={i} style={{
                    padding: '8px 10px', borderRadius: 8, marginBottom: 4, fontSize: 13,
                    background: hasError ? C.dangerLight : C.bg,
                    border: `1px solid ${hasError ? '#fca5a5' : C.border}`,
                  }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <span style={{ fontWeight: 600, color: hasError ? C.danger : C.text }}>
                        {hasError ? '✕' : '✓'} {r.name !== '—' ? r.name : '(no name)'}
                      </span>
                      <span style={{ color: C.muted, fontSize: 12 }}>{r.group}</span>
                    </div>
                    {hasError && <div style={{ fontSize: 11, color: C.danger, marginTop: 2 }}>Row {r.row}: {r.errors.join(', ')}</div>}
                  </div>
                );
              })}
              {csvPreview.length > 12 && <div style={{ fontSize: 12, color: C.muted, padding: '6px 0' }}>…and {csvPreview.length - 12} more rows</div>}
              <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
                <Button style={{ flex: 1 }} disabled={validRows.length === 0} onClick={confirmCSVImport}>
                  Import {validRows.length} Runner{validRows.length !== 1 ? 's' : ''}
                </Button>
                <Button variant="secondary" style={{ flex: 1 }} onClick={() => { setShowCSVModal(false); setCsvPreview(null); }}>Cancel</Button>
              </div>
            </div>
          </div>
        );
      })()}

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: isMobile ? 22 : 26, fontWeight: 800 }}>
            {groupFilter ? groupFilter : 'Members'}
          </h1>
          <p style={{ color: C.muted, marginTop: 4, fontSize: 14 }}>
            {filtered.length} runner{filtered.length !== 1 ? 's' : ''}{groupFilter ? ` · ` : ` registered`}
            {groupFilter && (
              <button onClick={() => setGroupFilter(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.orange, fontFamily: 'Satoshi', fontSize: 13, padding: 0 }}>
                Clear filter
              </button>
            )}
          </p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {!isMobile && <Button variant="ghost" size="sm" onClick={downloadCSVTemplate}>⬇ CSV Template</Button>}
          <Button size={isMobile ? 'sm' : 'md'} style={{ background: C.blue, boxShadow: '0 2px 8px rgba(37,99,235,0.28)' }} onClick={() => { sfx.click(); setShowCSVGuide(true); }}>⬆ Import CSV</Button>
          <Button size={isMobile ? 'sm' : 'md'} onClick={() => setShowAddModal(true)}>+ Add</Button>
        </div>
      </div>

      <Card style={{ padding: isMobile ? 12 : 24 }}>
        <div style={{ marginBottom: 16, position: 'relative' }}>
          <input
            type="text"
            placeholder="Search by name, ID, or group..."
            autoCapitalize="none"
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{
              width: '100%', padding: '10px 36px 10px 14px', borderRadius: 12,
              border: `1.5px solid ${C.border}`, fontSize: 14,
              fontFamily: 'Satoshi, sans-serif', background: C.bg, outline: 'none',
              boxSizing: 'border-box',
            }}
          />
          {search && (
            <button
              onClick={() => setSearch('')}
              style={{
                position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)',
                background: C.muted, color: '#fff', border: 'none', borderRadius: '50%',
                width: 20, height: 20, cursor: 'pointer', fontSize: 12, lineHeight: '20px',
                textAlign: 'center', padding: 0, fontFamily: 'Satoshi, sans-serif',
              }}

          )}
        </div>

        {isMobile ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {filtered.map(r => {
              const lc = levelColor(r.level);
              return (
                <div key={r.id} style={{ border: `1px solid ${C.border}`, borderRadius: 12, padding: '12px 14px', background: C.bg }}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, marginBottom: 8 }}>
                    <div
                      onClick={() => { sfx.click(); setSelectedRunner(r); setPage('runnerprofile'); }}
                      style={{
                        width: 40, height: 40, borderRadius: '50%', flexShrink: 0,
                        background: lc.bg, border: `2.5px solid ${lc.border}`,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 15, fontWeight: 800, color: lc.color, cursor: 'pointer',
                      }}
                    >{r.name[0]}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div style={{ fontWeight: 700, fontSize: 14, cursor: 'pointer' }}
                          onClick={() => { sfx.click(); setSelectedRunner(r); setPage('runnerprofile'); }}>{r.name}</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <button onClick={e => { sfx.click(); openEdit(r, e); }}
                            style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8,
                              padding: '3px 10px', fontSize: 11, fontWeight: 600, color: C.muted, cursor: 'pointer', fontFamily: 'Satoshi' }}>
                            Edit
                          </button>
                          <span style={{
                            background: lc.bg, color: lc.color, border: `1px solid ${lc.border}`,
                            borderRadius: 999, padding: '2px 10px', fontSize: 12, fontWeight: 700,
                          }}>L{r.level}</span>
                        </div>
                      </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px 16px', fontSize: 12, cursor: 'pointer' }}
                    onClick={() => { sfx.click(); setSelectedRunner(r); setPage('runnerprofile'); }}>
                    <div><span style={{ color: C.muted }}>ID </span><span style={{ fontFamily: "'JetBrains Mono', monospace" }}>{r.id}</span></div>
                    <div><span style={{ color: C.muted }}>PB </span><span style={{ fontWeight: 600 }}>{r.pb}</span></div>
                    <div><span style={{ color: C.muted }}>Streak </span><span style={{ color: C.orange, fontWeight: 700 }}>{r.streak}<span className={r.streak >= 10 ? 'streak-flame' : ''}>🔥</span></span></div>
                    <div><span style={{ color: C.muted }}>Points </span><span style={{ fontWeight: 700 }}>{r.points.toLocaleString()}</span></div>
                    <div style={{ gridColumn: '1 / -1' }}><span style={{ color: C.muted }}>Group </span><span style={{ fontWeight: 600 }}>{rGroups(r).join(', ') || '—'}</span></div>
                  </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                  {['Runner ID', 'Name', 'Level', 'PB', 'Group', 'Streak', 'Points', ''].map(h => (
                    <th key={h} style={{ padding: '8px 12px', textAlign: 'left', fontWeight: 600, color: C.muted, fontSize: 12, whiteSpace: 'nowrap' }}>
                      {h}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => {
                  const lc = levelColor(r.level);
                  return (
                    <tr
                      key={r.id}
                      className="tr-hover"
                      style={{ borderBottom: `1px solid ${C.border}`, cursor: 'pointer' }}
                      onClick={() => { sfx.click(); setSelectedRunner(r); setPage('runnerprofile'); }}
                    >
                      <td style={{ padding: '12px', fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: C.muted }}>{r.id}</td>
                      <td style={{ padding: '12px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                          <div style={{
                            width: 32, height: 32, borderRadius: '50%', flexShrink: 0,
                            background: lc.bg, border: `2px solid ${lc.border}`,
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            fontSize: 13, fontWeight: 800, color: lc.color,
                          }}>{r.name[0]}</div>
                          <span style={{ fontWeight: 600 }}>{r.name}</span>
                        </div>
                      </td>
                      <td style={{ padding: '12px' }}>
                        <span style={{
                          background: lc.bg, color: lc.color, border: `1px solid ${lc.border}`,
                          borderRadius: 999, padding: '2px 10px', fontSize: 12, fontWeight: 700,
                        }}>
                          L{r.level}
                        </span>
                      </td>
                      <td style={{ padding: '12px', fontWeight: 600 }}>{r.pb}</td>
                      <td style={{ padding: '12px', color: C.muted, fontSize: 13 }}>{rGroups(r).join(', ') || '—'}</td>
                      <td style={{ padding: '12px' }}>
                        <span style={{ color: C.orange, fontWeight: 700 }}>{r.streak}<span className={r.streak >= 10 ? 'streak-flame' : ''}>🔥</span></span>
                      </td>
                      <td style={{ padding: '12px', fontWeight: 700 }}>{r.points.toLocaleString()}</td>
                      <td style={{ padding: '12px' }}>
                        <div style={{ display: 'flex', gap: 6 }}>
                          <Button size="sm" variant="outline" onClick={e => { sfx.click(); openEdit(r, e); }}>Edit</Button>
                          <Button size="sm" variant="ghost">View →</Button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>

      {/* ── Edit Runner Modal ── */}
      {editRunner && (
        <div style={{ position:'fixed', inset:0, zIndex:500, background:'rgba(0,0,0,0.4)',
          display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
          onClick={() => setEditRunner(null)}>
          <div style={{ background:C.white, borderRadius:20, padding:28, width:'100%', maxWidth:400,
            boxShadow:'0 20px 60px rgba(0,0,0,0.2)' }} onClick={e => e.stopPropagation()}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
              <div style={{ fontWeight:800, fontSize:18 }}>Edit Runner</div>
              <button onClick={() => setEditRunner(null)}
                style={{ background:'none', border:'none', fontSize:20, cursor:'pointer', color:C.muted }}>✕</button>
            </div>
            <div style={{ marginBottom:16 }}>
              <label style={{ display:'block', fontSize:13, fontWeight:600, marginBottom:6 }}>Name</label>
              <input value={editForm.name} onChange={e => setEditForm(f => ({ ...f, name: e.target.value }))}
                autoCapitalize="words"
                style={{ width:'100%', padding:'11px 14px', borderRadius:10, border:`1.5px solid ${C.border}`,
                  fontSize:14, fontFamily:'Satoshi, sans-serif', outline:'none', background:C.white, boxSizing:'border-box' }} />
            </div>
            <div style={{ marginBottom:24 }}>
              <label style={{ display:'block', fontSize:13, fontWeight:600, marginBottom:6 }}>Club / Group</label>
              <select value={editForm.group} onChange={e => setEditForm(f => ({ ...f, group: e.target.value }))}
                style={{ width:'100%', padding:'11px 14px', borderRadius:10, border:`1.5px solid ${C.border}`,
                  fontSize:14, fontFamily:'Satoshi, sans-serif', background:C.white, boxSizing:'border-box' }}>
                {GROUPS.map(g => <option key={g.id} value={g.name}>{g.name}</option>)}
              </select>
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <Button variant="outline" style={{ flex:1 }} onClick={() => setEditRunner(null)}>Cancel</Button>
              <Button style={{ flex:1 }} onClick={handleEditSave}>Save changes</Button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── EVENTS PAGE ──────────────────────────────────────────────────────────────
function EventsPage({ setPage }) {
  const isMobile = useIsMobile();
  const upcoming = EVENTS.filter(e => e.status === 'upcoming');
  const completed = EVENTS.filter(e => e.status === 'completed');

  const EventCard = ({ ev }) => {
    const s = statusBadge(ev.status);
    const accentColor = ev.status === 'upcoming' ? C.orange : ev.status === 'completed' ? C.success : C.muted;
    return (
      <div style={{
        padding: '14px 0 14px 12px', borderBottom: `1px solid ${C.border}`,
        borderLeft: `3px solid ${accentColor}`, marginLeft: -4, paddingLeft: 12,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 3 }}>{ev.name}</div>
            <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>{ev.date} · {ev.group}</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              <Badge label={ev.format} bg={C.orangeLight} color={C.orange} />
              <Badge label={s.label} bg={s.bg} color={s.color} />
              <span style={{ fontSize: 12, color: C.muted, alignSelf: 'center' }}>{ev.runners} runners</span>
            </div>
          </div>
          {ev.status === 'upcoming' && (
            <Button size="sm" onClick={() => { sfx.click(); setPage('runevent'); }} style={{ flexShrink: 0 }}>Run →</Button>
          )}
        </div>
      </div>
    );
  };

  if (isMobile) {
    return (
      <div className="fade-in">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div>
            <h1 style={{ fontSize: 22, fontWeight: 800 }}>Events</h1>
            <p style={{ color: C.muted, marginTop: 2, fontSize: 13 }}>Scheduled and past events</p>
          </div>
          <Button size="sm" onClick={() => { sfx.click(); setPage('createevent'); }}>+ Create</Button>
        </div>

        <Card style={{ marginBottom: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
            <div style={{ fontWeight: 700, fontSize: 15 }}>Upcoming</div>
            <Badge label={upcoming.length} bg={C.blueLight} color={C.blue} />
          </div>
          {upcoming.length === 0 && <EmptyState icon="events" heading="No upcoming events" sub="Create an event to get started." />}
          {upcoming.map(ev => <EventCard key={ev.id} ev={ev} />)}
        </Card>

        <Card>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
            <div style={{ fontWeight: 700, fontSize: 15 }}>Recent Results</div>
            <Badge label={completed.length} bg={C.bgSubtle} color={C.muted} />
          </div>
          {completed.length === 0 && <EmptyState icon="runevent" heading="No completed events yet" sub="Results will appear here after your first race." />}
          {completed.map(ev => <EventCard key={ev.id} ev={ev} />)}
        </Card>
      </div>
    );
  }

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 28 }}>
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 800 }}>Events</h1>
          <p style={{ color: C.muted, marginTop: 4, fontSize: 14 }}>All scheduled and past events</p>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <Button variant="secondary" onClick={() => { sfx.click(); setPage('createevent'); }}>+ Create Event</Button>
          <Button onClick={() => { sfx.click(); setPage('runevent'); }}>Run Event</Button>
        </div>
      </div>

      <Card>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${C.border}` }}>
              {['Event', 'Group', 'Date', 'Format', 'Runners', 'Status', ''].map(h => (
                <th key={h} style={{ padding: '8px 12px', textAlign: 'left', fontWeight: 600, color: C.muted, fontSize: 12 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {EVENTS.map(ev => {
              const s = statusBadge(ev.status);
              return (
                <tr key={ev.id} style={{ borderBottom: `1px solid ${C.border}` }}>
                  <td style={{ padding: '12px', fontWeight: 600 }}>{ev.name}</td>
                  <td style={{ padding: '12px', color: C.muted, fontSize: 13 }}>{ev.group}</td>
                  <td style={{ padding: '12px', color: C.muted }}>{ev.date}</td>
                  <td style={{ padding: '12px' }}>
                    <Badge label={ev.format} bg={C.orangeLight} color={C.orange} />
                  </td>
                  <td style={{ padding: '12px' }}>{ev.runners}</td>
                  <td style={{ padding: '12px' }}><Badge label={s.label} bg={s.bg} color={s.color} /></td>
                  <td style={{ padding: '12px' }}>
                    {ev.status === 'upcoming' && (
                      <Button size="sm" onClick={() => { sfx.click(); setPage('runevent'); }}>Run →</Button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ── CREATE EVENT WIZARD ──────────────────────────────────────────────────────
function CreateEventPage({ setPage, runners }) {
  const liveRunners = runners || RUNNERS;
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({
    group: 'Year 6 Running Club',
    format: 'Pursuit',
    course: '1.5km Loop',
    date: '2026-05-21',
    time: '15:30',
  });
  const [customCourses, setCustomCourses] = useState([]);
  const [showCustomCourse, setShowCustomCourse] = useState(false);
  const [customCourseInput, setCustomCourseInput] = useState('');

  const FORMAT_HINTS = {
    Pursuit:  '🐇 Handicap: runners start in staggered groups by level; slower runners go first. Aim: everyone finishes together.',
    Scratch:  '🏁 Scratch: all runners start simultaneously. First across the line wins outright.',
    Relay:    '🔄 Relay: team event with baton or tag handover. Assign runners to teams after creation.',
  };

  const allCourses = ['1.5km Loop', '2km Track', '5km Road', 'Cross Country', ...customCourses];

  const steps = ['Details', 'Review', 'Confirm'];

  return (
    <div className="fade-in">
      <div style={{ marginBottom: 28 }}>
        <button
          onClick={() => { sfx.click(); setPage('events'); }}
          style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.muted, fontSize: 14, fontFamily: 'Satoshi', marginBottom: 8 }}
        >
          ← Back to Events
        </button>
        <h1 style={{ fontSize: 26, fontWeight: 800 }}>Create Event</h1>
      </div>

      {/* Step indicator */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 32, maxWidth: 500 }}>
        {steps.map((s, i) => {
          const n = i + 1;
          const active = step === n;
          const done = step > n;
          return (
            <React.Fragment key={n}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{
                  width: 32, height: 32, borderRadius: '50%', display: 'flex',
                  alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 14,
                  background: done ? C.success : active ? C.orange : '#e8e0d8',
                  color: (done || active) ? C.white : C.muted,
                }}>
                  {done ? '✓' : n}
                </div>
                <span style={{ fontWeight: active ? 700 : 500, color: active ? C.text : C.muted, fontSize: 14 }}>{s}</span>
              </div>
              {i < steps.length - 1 && (
                <div style={{ flex: 1, height: 2, background: step > n ? C.success : C.border }} />
              )}
            </React.Fragment>
          );
        })}
      </div>

      <Card style={{ maxWidth: 600 }}>
        {step === 1 && (
          <div>
            <div style={{ fontWeight: 700, fontSize: 18, marginBottom: 20 }}>Step 1: Event Details</div>

            {/* Group */}
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Group</label>
              <select value={form.group} onChange={e => setForm({ ...form, group: e.target.value })}
                style={{ width: '100%', padding: '10px 14px', borderRadius: 12, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi, sans-serif', background: C.white }}>
                {GROUPS.filter(g => !g.archived).map(g => <option key={g.id}>{g.name}</option>)}
              </select>
            </div>

            {/* Format */}
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Format</label>
              <select value={form.format} onChange={e => setForm({ ...form, format: e.target.value })}
                style={{ width: '100%', padding: '10px 14px', borderRadius: 12, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi, sans-serif', background: C.white }}>
                {['Pursuit', 'Scratch', 'Relay'].map(o => <option key={o}>{o}</option>)}
              </select>
              {FORMAT_HINTS[form.format] && (
                <div style={{ marginTop: 6, fontSize: 12, color: C.muted, background: C.bg, borderRadius: 8, padding: '6px 10px' }}>
                  {FORMAT_HINTS[form.format]}
                </div>
              )}
            </div>

            {/* Course */}
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Course</label>
              <select value={form.course} onChange={e => {
                if (e.target.value === '__custom__') { setShowCustomCourse(true); }
                else { setForm({ ...form, course: e.target.value }); setShowCustomCourse(false); }
              }}
                style={{ width: '100%', padding: '10px 14px', borderRadius: 12, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi, sans-serif', background: C.white }}>
                {allCourses.map(o => <option key={o}>{o}</option>)}
                <option value="__custom__">+ Add custom course…</option>
              </select>
              {showCustomCourse && (
                <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                  <input value={customCourseInput} onChange={e => setCustomCourseInput(e.target.value)}
                    placeholder="e.g. 3km Park Route" autoCapitalize="words"
                    style={{ flex: 1, padding: '8px 12px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Satoshi', background: C.white }} />
                  <Button size="sm" disabled={!customCourseInput.trim()} onClick={() => {
                    const name = customCourseInput.trim();
                    setCustomCourses(prev => [...prev, name]);

            {/* Date & Time */}
