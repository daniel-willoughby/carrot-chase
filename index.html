<div id="root" style="display:none;"></div>

<script>
  const HASH = 'b34563e2ebeb771708ba0648c9385383f61cc11e86af6076848433059c14b2df';

  async function checkGate() {
    const val = document.getElementById('gate-input').value;
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hex === HASH) {
      sessionStorage.setItem('cc_auth', '1');
      document.getElementById('gate').style.display = 'none';
      document.getElementById('root').style.display = '';
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('gate-input').style.borderColor = '#dc2626';
      document.getElementById('gate-input').value = '';
      setTimeout(() => {
        document.getElementById('gate-error').style.display = 'none';
        document.getElementById('gate-input').style.borderColor = '#e5e7eb';
      }, 2000);
    }
  }

  // On load: if already authed this session, skip gate
  if (sessionStorage.getItem('cc_auth') === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('root').style.display = '';
  } else {
    document.getElementById('gate').style.display = 'flex';
    setTimeout(() => document.getElementById('gate-input').focus(), 100);
  }
</script>

// ── localStorage helpers ─────────────────────────────────────────────────────
function loadLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }

function saveLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ── Carrot Algorithm ─────────────────────────────────────────────────────────
// Target = second-fastest of last 5 event times (seconds)
function carrotTarget(runner) {
  if (!runner.times || runner.times.length < 2) return null;
  return [...runner.times].sort((a, b) => a - b)[1];
}

function fmtSecs(s) {
  if (s === null || s === undefined) return '—';
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2, '0')}`;
}

// ── Sound effects ────────────────────────────────────────────────────────────
const sfx = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }
  function tone(freq, dur, gain = 0.15, type = 'sine', t = 0) {
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(gain, c.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + t + dur);
      o.start(c.currentTime + t); o.stop(c.currentTime + t + dur);
    } catch(e) {}
  }
  return {
    // Soft tick when marking a runner present
    tick()   { tone(700, 0.055, 0.025); },
    // Satisfying thud when tapping a finisher
    tap()    { tone(160, 0.09, 0.09, 'sine'); tone(320, 0.06, 0.04, 'sine'); },
    // Gentle chime when assigning a runner to a position
    assign() { tone(880, 0.07, 0.03); tone(1100, 0.05, 0.018, 'sine', 0.06); },
    // Triumphant fanfare for Race Complete
    fanfare() {
      [[523,0.18,0.3,0.0],[659,0.18,0.3,0.14],[784,0.18,0.3,0.28],[1047,0.55,0.42,0.43],

      // Harmony layer
      tone(659, 0.7, 0.18, 'sine', 0.43);
      tone(523, 0.7, 0.13, 'sine', 0.43);
    },
    // Very soft tap for navigation / generic button press
    click()   { tone(600, 0.04, 0.018); },
    // Soft ascending two-note for positive confirmations (add, save, create)
    confirm() { tone(523, 0.07, 0.022); tone(784, 0.1, 0.028, 'sine', 0.08); },
    // Soft descending two-note for dismiss / cancel / back / sign out
    dismiss() { tone(440, 0.07, 0.02); tone(330, 0.09, 0.022, 'sine', 0.07); },
    // Gentle ascending three-note for successful login
    login()   { tone(523, 0.06, 0.02); tone(659, 0.06, 0.022, 'sine', 0.09); tone(784, 0.1, 0.028, 'sine', 0.18); },
  };
})();

function StatCard({ label, value, sub, color, icon, onClick }) {
  const accent = color || C.border;
  const hasTrendUp   = sub && /^\+/.test(sub.trim());
  const hasTrendDown = sub && /^-/.test(sub.trim());
  const bgTint = color ? `${color}08` : 'transparent';

  const [displayed, setDisplayed] = useState(value);
  useEffect(() => {
    const str = String(value);
    const prefix = str.startsWith('£') ? '£' : '';
    const stripped = str.replace(/[£,]/g, '');
    const num = Number(stripped);
    if (!isNaN(num) && num > 0 && !/[:/a-zA-Z]/.test(str)) {
      const useCommas = str.includes(',');
      let start = null;
      const dur = 480;
      const step = (ts) => {
        if (!start) start = ts;
        const t = Math.min((ts - start) / dur, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        const cur = Math.round(ease * num);
        setDisplayed(prefix + (useCommas ? cur.toLocaleString() : String(cur)));
        if (t < 1) requestAnimationFrame(step);
        else setDisplayed(value);
      };
      requestAnimationFrame(step);
    } else {
      setDisplayed(value);
    }
  }, [value]);

  return (
    <Card onClick={onClick} className={onClick ? 'card-hover' : ''} style={{
      flex: 1, minWidth: 160, padding: 0, overflow: 'hidden',
      borderTop: `3px solid ${accent}`,
      cursor: onClick ? 'pointer' : 'default',
    }}>
      <div style={{ padding: '18px 20px 16px', background: bgTint }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
          <div style={{ color: C.muted, fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', lineHeight: 1.3 }}>{label}</div>
          {icon && (ICONS[icon]
            ? <NavIcon name={icon} size={16} style={{ opacity: 0.6, color: color || C.muted }} />
            : <span style={{ fontSize: 16, opacity: 0.7 }}>{icon}</span>
          )}
        </div>
        <div style={{ fontSize: 28, fontWeight: 800, color: color || C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', letterSpacing: '-0.03em', lineHeight: 1.1 }}>{displayed}</div>
        {sub && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 8 }}>
            {hasTrendUp   && <span style={{ fontSize: 11, color: C.success, fontWeight: 700 }}>↑</span>}
            {hasTrendDown && <span style={{ fontSize: 11, color: C.danger,  fontWeight: 700 }}>↓</span>}
            <div style={{ fontSize: 12, color: C.muted, lineHeight: 1.4 }}>{sub}</div>
          </div>
        )}
      </div>
    </Card>
  );
}

// ── SVG Line Chart ─────────────────────────────────────────────────────────────
function LineChart({ data, labels, title, height=200, color=C.orange }) {
  const W = 560, H = height;
  const pad = { top: 20, right: 20, bottom: 30, left: 50 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;
  const min = 0, max = Math.max(...data) * 1.1;
  const xs = data.map((_, i) => pad.left + (i / (data.length - 1)) * w);
  const ys = data.map(v => pad.top + h - ((v - min) / (max - min)) * h);
  const path = xs.map((x, i) => `${i === 0 ? 'M' : 'L'} ${x},${ys[i]}`).join(' ');
  const area = `${path} L ${xs[xs.length-1]},${pad.top+h} L ${xs[0]},${pad.top+h} Z`;
  const yTicks = [0, max*0.25, max*0.5, max*0.75, max].map(v => Math.round(v));

  return (
    <div>
      {title && <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: '-0.01em', marginBottom: 12 }}>{title}</div>}
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: H }} xmlns="http://www.w3.org/2000/svg">
        {yTicks.map((v, i) => {
          const y = pad.top + h - (v / (max || 1)) * h;
          return (
            <g key={i}>
              <line x1={pad.left} x2={W-pad.right} y1={y} y2={y} stroke="#e8e0d8" strokeWidth={1} />
              <text x={pad.left-6} y={y+4} textAnchor="end" fontSize={11} fill={C.muted}>
                {v >= 1000 ? `${(v/1000).toFixed(1)}k` : v}
              </text>
            </g>
          );
        })}
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.15" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        <path d={area} fill="url(#areaGrad)" />
        <path d={path} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round" />
        {xs.map((x, i) => (
          <circle key={i} cx={x} cy={ys[i]} r={3.5} fill={color} stroke={C.white} strokeWidth={2} />
        ))}
        {labels && labels.map((l, i) => (
          <text key={i} x={xs[i]} y={H-2} textAnchor="middle" fontSize={10} fill={C.muted}>{l}</text>
        ))}
      </svg>
    </div>
  );
}

                onClick={() => { sfx.click(); setPage(item.id); }}
                style={{
                  flex: 1, display: 'flex', flexDirection: 'column',
                  alignItems: 'center', justifyContent: 'center', gap: 2,
                  border: 'none', background: 'transparent', cursor: 'pointer',
                  color: active ? C.orange : C.muted,
                  fontFamily: 'Satoshi, sans-serif',
                  position: 'relative',
                }}
              >
                {active && (
                  <div style={{
                    position: 'absolute', top: 6, left: '50%', transform: 'translateX(-50%)',
                    width: 44, height: 30, borderRadius: 999,
                    background: C.orangeLight,
                    zIndex: 0,
                  }} />
                )}
                <NavIcon name={item.icon} size={18} style={{ position: 'relative', zIndex: 1 }} />
                <span style={{ fontSize: 10, fontWeight: active ? 700 : 500, position: 'relative', zIndex: 1 }}>{item.label}</span>
              </button>
            );
          })}
        </nav>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: C.bg }}>
      <Sidebar role={role} page={page} setPage={setPage} user={user} onLogout={onLogout} onResetData={onResetData} isDark={isDark} onToggleDark={onToggleDark} />
      <main style={{ flex: 1, marginLeft: 240, minHeight: '100vh', padding: 32 }}>
        {children}
      </main>
    </div>
  );
}

function LoginPage({ onLogin }) {
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [error, setError]       = useState('');
  const [pendingUser, setPendingUser] = useState(null);
  const [twoFACode, setTwoFACode] = useState('');
  const [twoFAError, setTwoFAError] = useState('');
  const DEMO_CODE = '482716';
  const isMobile = useIsMobile();

  const CREDS = [
    { label: 'Super Admin',   email: 'super@demo.carrotchase.com',  password: 'demo1234', role: 'superadmin', name: 'Alex Morgan'    },
    { label: 'School Admin',  email: 'sarah@demo.carrotchase.com',  password: 'demo1234', role: 'schooladmin', name: 'Sarah Mitchell' },
    { label: 'Lead',          email: 'james@demo.carrotchase.com',  password: 'demo1234', role: 'lead',       name: 'James Carter'   },
  ];

  function handleLogin(e) {
    e.preventDefault();
    const match = CREDS.find(c => c.email === email && c.password === password);
    if (match) { sfx.click(); setPendingUser({ email: match.email, role: match.role, name: match.name }); }
    else { setError('Invalid credentials. Try the demo credentials below.'); }

  function handleVerify(e) {
    e.preventDefault();

    else { setTwoFAError('Incorrect code. Try the demo code shown above.'); }
  }

  // ── 2FA screen ──────────────────────────────────────────────────────────────
  if (pendingUser) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: C.bg, padding: 24 }}>

            <button
              type="button"
              onClick={() => { setTwoFACode(DEMO_CODE); setTwoFAError(''); }}
              style={{
                background: C.orange, color: C.white, border: 'none', borderRadius: 8,
                padding: '6px 14px', fontSize: 13, fontWeight: 700, cursor: 'pointer',
                fontFamily: 'Satoshi, sans-serif', flexShrink: 0,
              }}
            >
              Fill ↓
            </button>
          </div>
          <form onSubmit={handleVerify}>
            <input
              value={twoFACode}
              onChange={e => { setTwoFACode(e.target.value); setTwoFAError(''); }}
              placeholder="Enter 6-digit code"
              maxLength={6}
              style={{
                width: '100%', padding: '14px', borderRadius: 12, border: `2px solid ${twoFAError ? C.danger : C.border}`,
                fontSize: 22, textAlign: 'center', letterSpacing: 6, fontFamily: 'Satoshi', marginBottom: 12,
                background: C.white, boxSizing: 'border-box',
              }}
            />
            {twoFAError && <div style={{ color: C.danger, fontSize: 13, marginBottom: 12 }}>{twoFAError}</div>}
            <Button style={{ width: '100%', justifyContent: 'center', marginBottom: 12 }}>Verify →</Button>
          </form>
          <button onClick={() => { setPendingUser(null); setTwoFACode(''); setTwoFAError(''); }}
            style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.muted, fontSize: 14, fontFamily: 'Satoshi' }}>
            ← Back to login
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', minHeight: '100vh' }}>

      <div style={{
        flex: isMobile ? 'none' : 1,
        background: 'linear-gradient(160deg, #EC5A10 0%, #D04A08 100%)',
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        padding: isMobile ? '28px 20px' : 48,
        color: C.white,
      }}>
        <span style={{ fontSize: isMobile ? 40 : 72, marginBottom: isMobile ? 10 : 24 }}>🥕</span>
        <h1 style={{ fontSize: isMobile ? 26 : 40, fontWeight: 800, marginBottom: 8, textAlign: 'center' }}>Carrot Chase</h1>
        <p style={{ fontSize: isMobile ? 14 : 20, fontWeight: 400, marginBottom: isMobile ? 16 : 48, opacity: 0.9, textAlign: 'center' }}>
          Pursuit racing for every runner
        </p>
        <div style={{ display: 'flex', flexDirection: isMobile ? 'row' : 'column', flexWrap: 'wrap', gap: isMobile ? 8 : 14, width: '100%', maxWidth: 360, justifyContent: 'center' }}>
          {[
            '400% more participation',
            '£1,000 avg school return',
            '99 levels of competition',
          ].map(stat => (
            <div key={stat} style={{
              border: '2px solid rgba(255,255,255,0.6)', borderRadius: 999,
              padding: isMobile ? '6px 12px' : '12px 24px',
              fontSize: isMobile ? 11 : 15, fontWeight: 600, textAlign: 'center',
              backdropFilter: 'blur(4px)', background: 'rgba(255,255,255,0.08)',

              {stat}

          <h2 style={{ fontSize: 26, fontWeight: 800, marginBottom: 6 }}>Sign in</h2>
          <p style={{ color: C.muted, marginBottom: 32, fontSize: 14 }}>
            Welcome back! Sign in to your account.

          <form onSubmit={handleLogin}>

              }}>
                {error}

          {/* Demo credentials */}
          <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.muted, marginBottom: 10 }}>

            <div style={{ display: 'flex', gap: 8 }}>

function OrgLogo({ org, size = 40 }) {
  const crest = ORG_CRESTS[org.id];
  const uid = React.useId();
  if (crest) {
    const cid = uid.replace(/:/g, '');
    return (
      <svg width={size} height={size * 1.28} viewBox="0 0 100 128" xmlns="http://www.w3.org/2000/svg"
        style={{ display: 'block', flexShrink: 0 }}>
        {crest(cid)}
      </svg>
    );
  }
  // Fallback for newly added orgs
  const color = org.logoColor || '#9CA3AF';
  return (
    <div style={{
      width: size, height: size, borderRadius: 10, flexShrink: 0,
      background: color + '22', border: `1.5px solid ${color}44`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.5,
    }}>
      {org.logo || org.name[0]}
    </div>
  );
}

function OrgTable({ orgs, compact, isMobile, onView }) {
  if (isMobile) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {orgs.map(org => {
          const s = statusBadge(org.status);
          return (
            <div key={org.id} style={{
              border: `1px solid ${C.border}`, borderRadius: 12, padding: '12px 14px',
              background: C.bg,
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <OrgLogo org={org} size={36} />
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{org.name}</div>
                </div>
                <Badge label={s.label} bg={s.bg} color={s.color} />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px 16px', fontSize: 12 }}>
                <div><span style={{ color: C.muted }}>Type </span><span style={{ fontWeight: 600 }}>{org.type}</span></div>
                <div><span style={{ color: C.muted }}>Location </span><span style={{ fontWeight: 600 }}>{org.location}</span></div>
                <div><span style={{ color: C.muted }}>Runners </span><span style={{ fontWeight: 600 }}>{org.runners}</span></div>
                <div><span style={{ color: C.muted }}>Events </span><span style={{ fontWeight: 600 }}>{org.events}</span></div>
                <div style={{ gridColumn: '1 / -1' }}><span style={{ color: C.muted }}>Admin </span><span style={{ fontWeight: 600 }}>{org.admin}</span></div>
              </div>
              {!compact && (
                <div style={{ marginTop: 10 }}>
                  <Button size="sm" variant="outline" onClick={() => onView(org)}>View →</Button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
        <thead>
          <tr style={{ borderBottom: `1px solid ${C.border}` }}>

              <th key={i} style={{ padding: '8px 12px', textAlign: 'left', fontWeight: 600, color: C.muted, fontSize: 12, whiteSpace: 'nowrap' }}>
                {h}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {orgs.map(org => {
            const s = statusBadge(org.status);
            return (
              <tr key={org.id} style={{ borderBottom: `1px solid ${C.border}` }}>
                <td style={{ padding: '10px 8px 10px 12px', width: 48 }}><OrgLogo org={org} size={36} /></td>
                <td style={{ padding: '12px 12px', fontWeight: 600 }}>{org.name}</td>
                <td style={{ padding: '12px 12px', color: C.muted }}>{org.type}</td>
                <td style={{ padding: '12px 12px', color: C.muted }}>{org.location}</td>
                <td style={{ padding: '12px 12px', fontWeight: 600 }}>{org.runners}</td>
                <td style={{ padding: '12px 12px', color: C.muted }}>{org.events}</td>
                <td style={{ padding: '12px 12px', color: C.muted }}>{org.admin}</td>
                <td style={{ padding: '12px 12px' }}><Badge label={s.label} bg={s.bg} color={s.color} /></td>
                <td style={{ padding: '12px 12px' }}>
                  {!compact && (
                    <Button size="sm" variant="ghost" onClick={() => onView(org)}>
                      View →

                  )}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

  const [tab, setTab] = React.useState('orgs'); // 'orgs' | 'invites'
  const [orgs, setOrgs] = React.useState(ORGS);
  const [invites, setInvites] = React.useState(SEED_INVITES);
  const [viewOrg, setViewOrg] = React.useState(null);
  const [showNewModal, setShowNewModal] = React.useState(false);
  const [showInviteModal, setShowInviteModal] = React.useState(false);
  const [newForm, setNewForm] = React.useState({ name: '', type: 'School', location: '', admin: '' });
  const [inviteForm, setInviteForm] = React.useState({ email: '', name: '', org: '' });
  const [inviteSent, setInviteSent] = React.useState(false);

  const inputStyle = {
    width: '100%', padding: '10px 14px', borderRadius: 12,
    border: `1.5px solid ${C.border}`, fontSize: 14,
    fontFamily: 'Satoshi, sans-serif', background: C.white,
    boxSizing: 'border-box',
  };

  function handleAddOrg() {
    if (!newForm.name.trim()) return;
    const next = {
      id: `org-${Date.now()}`,
      name: newForm.name.trim(),
      type: newForm.type,
      location: newForm.location.trim() || '—',
      admin: newForm.admin.trim() || '—',
      runners: 0,
      events: 0,
      status: 'active',
    };
    sfx.confirm();
    setOrgs([...orgs, next]);
    setNewForm({ name: '', type: 'School', location: '', admin: '' });
    setShowNewModal(false);
  }

  function handleSendInvite() {
    if (!inviteForm.email.trim()) return;
    sfx.confirm();
    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const next = {
      id: `inv-${Date.now()}`,
      email: inviteForm.email.trim(),
      name: inviteForm.name.trim(),
      org: inviteForm.org.trim() || '—',
      sentAt: today,
      status: 'sent',
    };
    setInvites(prev => [next, ...prev]);
    setInviteSent(true);
    setTimeout(() => {
      setInviteSent(false);
      setInviteForm({ email: '', name: '', org: '' });
      setShowInviteModal(false);
      setTab('invites');
    }, 1600);
  }

  function handleResend(id) {
    sfx.click();
    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    setInvites(prev => prev.map(inv => inv.id === id ? { ...inv, status: 'sent', sentAt: today } : inv));
  }

  function handleRevoke(id) {
    sfx.dismiss();
    setInvites(prev => prev.filter(inv => inv.id !== id));
  }

  function inviteStatusBadge(status) {
    if (status === 'accepted') return { label: 'Accepted', bg: C.successLight, color: C.success };
    if (status === 'expired')  return { label: 'Expired',  bg: C.dangerLight,  color: C.danger  };
    return { label: 'Sent', bg: C.blueLight, color: C.blue };
  }

  // ── Org detail panel ──────────────────────────────────────────────────────
  if (viewOrg) {
    const s = statusBadge(viewOrg.status);
    return (
      <div className="fade-in">
        <button
          onClick={() => setViewOrg(null)}
          style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.muted, fontSize: 14, fontFamily: 'Satoshi', marginBottom: 16 }}
        >
          ← Back to Organisations
        </button>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 24 }}>
          <OrgLogo org={viewOrg} size={56} />
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
              <h1 style={{ fontSize: isMobile ? 20 : 24, fontWeight: 800 }}>{viewOrg.name}</h1>
              <Badge label={s.label} bg={s.bg} color={s.color} />
            </div>
            <p style={{ color: C.muted, margin: 0 }}>{viewOrg.type} · {viewOrg.location}</p>
          </div>
        </div>
        <div style={{
          display: 'grid',
          gridTemplateColumns: isMobile ? '1fr 1fr' : 'repeat(4, 1fr)',
          gap: isMobile ? 10 : 16,
          marginBottom: 24,
        }}>
          <StatCard label="Runners" value={viewOrg.runners} sub="Registered" color={C.orange} />
          <StatCard label="Events" value={viewOrg.events} sub="All time" />
          <StatCard label="Plan" value="Pro" sub="Active licence" color={C.success} />
          <StatCard label="Admin" value={viewOrg.admin.split(' ')[0]} sub={viewOrg.admin} />
        </div>
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: '-0.01em', marginBottom: 16 }}>Organisation Details</div>
          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 16 }}>
            {[
              ['Name', viewOrg.name],
              ['Type', viewOrg.type],
              ['Location', viewOrg.location],
              ['Admin Contact', viewOrg.admin],
              ['Status', s.label],
            ].map(([label, val]) => (
              <div key={label}>
                <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, marginBottom: 4 }}>{label}</div>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{val}</div>
              </div>
            ))}
          </div>
        </Card>
        {/* Groups */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: '-0.01em', marginBottom: 14 }}>Groups</div>
          {GROUPS.map(g => (
            <div key={g.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: `1px solid ${C.border}`, fontSize: 14 }}>
              <div>
                <span style={{ fontWeight: 600 }}>{g.name}</span>
                <span style={{ color: C.muted, fontSize: 12, marginLeft: 8 }}>{g.type}</span>
              </div>
              <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                {g.lead && <span style={{ fontSize: 12, color: C.muted }}>Lead: {g.lead}</span>}
                <Badge label={`${g.members} runners`} bg={C.orangeLight} color={C.orange} />
              </div>
            </div>
          ))}
        </Card>

        {/* Recent events */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: '-0.01em', marginBottom: 14 }}>Recent Events</div>
          {EVENTS.filter(e => e.status === 'completed').slice(0, 4).map(ev => (
            <div key={ev.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: `1px solid ${C.border}`, fontSize: 14 }}>
              <div>
                <div style={{ fontWeight: 600 }}>{ev.name}</div>
                <div style={{ fontSize: 12, color: C.muted }}>{ev.date} · {ev.group}</div>
              </div>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <Badge label={ev.format} bg={C.orangeLight} color={C.orange} />
                <span style={{ fontSize: 12, color: C.muted }}>{ev.runners} finishers</span>
              </div>
            </div>
          ))}
          {EVENTS.filter(e => e.status === 'completed').length === 0 && (
            <EmptyState icon="events" heading="No events yet" sub="Completed events will appear here." />
          )}
        </Card>

        <div style={{ display: 'flex', gap: 10 }}>
          <Button variant="secondary" onClick={() => setViewOrg(null)}>Close</Button>
        </div>
      </div>
    );
  }

  // ── Main list ─────────────────────────────────────────────────────────────
  return (
    <div className="fade-in">
      {/* Add Organisation modal */}
      {showNewModal && (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 500,
          background: 'rgba(0,0,0,0.35)', display: 'flex',
          alignItems: 'flex-start', justifyContent: 'center',
          padding: '16px 16px', paddingTop: 'max(16px, 8vh)', overflowY: 'auto',
        }}>
          <div style={{
            background: C.white, borderRadius: 20, padding: 28,
            width: '100%', maxWidth: 420, boxShadow: C.shadowLg,
          }}>
            <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.02em', marginBottom: 20 }}>New Organisation</div>
            {[
              { label: 'Name', key: 'name', placeholder: 'e.g. Riverside Academy' },
              { label: 'Location', key: 'location', placeholder: 'e.g. London' },
              { label: 'Admin Contact', key: 'admin', placeholder: 'e.g. Jane Smith' },
            ].map(f => (
              <div key={f.key} style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>{f.label}</label>
                <input
                  value={newForm[f.key]}
                  onChange={e => setNewForm({ ...newForm, [f.key]: e.target.value })}
                  placeholder={f.placeholder}
                  autoCapitalize="words"
                  style={inputStyle}
                />
              </div>
            ))}
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Type</label>
              <select
                value={newForm.type}
                onChange={e => setNewForm({ ...newForm, type: e.target.value })}
                style={inputStyle}
              >
                {['School', 'Academy', 'Running Club', 'Business'].map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <Button style={{ flex: 1 }} onClick={handleAddOrg}>Add Organisation</Button>
              <Button variant="secondary" style={{ flex: 1 }} onClick={() => setShowNewModal(false)}>Cancel</Button>
            </div>
          </div>
        </div>
      )}

      {/* Invite modal */}
      {showInviteModal && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '16px 16px', paddingTop: 'max(16px, 8vh)', overflowY: 'auto' }}>
          <div style={{ background: C.white, borderRadius: 20, padding: 28, width: '100%', maxWidth: 420, boxShadow: C.shadowLg }}>
            {inviteSent ? (
              <div style={{ textAlign: 'center', padding: '20px 0' }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>✉️</div>
                <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.02em', marginBottom: 6 }}>Invitation sent!</div>
                <div style={{ fontSize: 14, color: C.muted }}>A setup link has been sent to {inviteForm.email}. It expires in 72 hours.</div>
              </div>
            ) : (
              <>
                <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.02em', marginBottom: 4 }}>Invite School Admin</div>
                <div style={{ fontSize: 13, color: C.muted, marginBottom: 20 }}>They'll receive an email with a setup link (expires in 72 hours).</div>
                {[
                  { label: 'Email address *', key: 'email', placeholder: 'admin@school.co.uk', type: 'email', cap: 'none' },
                  { label: 'Name (optional)', key: 'name',  placeholder: 'e.g. Jane Smith', type: 'text', cap: 'words' },
                  { label: 'Organisation (optional)', key: 'org', placeholder: 'e.g. Riverside Academy', type: 'text', cap: 'words' },
                ].map(f => (
                  <div key={f.key} style={{ marginBottom: 14 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>{f.label}</label>
                    <input
                      type={f.type}
                      value={inviteForm[f.key]}
                      onChange={e => setInviteForm(prev => ({ ...prev, [f.key]: e.target.value }))}
                      placeholder={f.placeholder}
                      autoCapitalize={f.cap}
                      style={inputStyle}
                    />
                  </div>
                ))}
                <div style={{ display: 'flex', gap: 10, marginTop: 8 }}>
                  <Button style={{ flex: 1 }} disabled={!inviteForm.email.trim()} onClick={handleSendInvite}>Send Invite</Button>
                  <Button variant="secondary" style={{ flex: 1 }} onClick={() => { setShowInviteModal(false); setInviteForm({ email: '', name: '', org: '' }); }}>Cancel</Button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Page header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: isMobile ? 16 : 24 }}>
        <div>
          <h1 style={{ fontSize: isMobile ? 22 : 26, fontWeight: 800 }}>Organisations</h1>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <Button variant="outline" size="sm" onClick={() => setShowInviteModal(true)}>{isMobile ? '✉️ Invite' : '✉️ Invite Admin'}</Button>
          {tab === 'orgs' && <Button size="sm" onClick={() => setShowNewModal(true)}>+ Add</Button>}
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 20, borderBottom: `1px solid ${C.border}`, paddingBottom: 0 }}>
        {[
          { id: 'orgs',    label: `Organisations (${orgs.length})` },
          { id: 'invites', label: `Invitations (${invites.filter(i => i.status === 'sent').length} pending)` },
        ].map(t => (
          <button key={t.id} onClick={() => { sfx.click(); setTab(t.id); }} style={{
            padding: '8px 16px', background: 'none', border: 'none', cursor: 'pointer',
            fontFamily: 'Satoshi, sans-serif', fontSize: 14, fontWeight: tab === t.id ? 700 : 500,
            color: tab === t.id ? C.orange : C.muted,
            borderBottom: `2px solid ${tab === t.id ? C.orange : 'transparent'}`,
            marginBottom: -1,
          }}>{t.label}</button>
        ))}
      </div>

      {/* Organisations tab */}
      {tab === 'orgs' && (
        <Card style={{ padding: isMobile ? 12 : 24 }}>
          <OrgTable orgs={orgs} isMobile={isMobile} onView={setViewOrg} />
        </Card>
      )}

      {/* Invitations tab */}
      {tab === 'invites' && (
        <Card>
          {invites.length === 0 && (
            <EmptyState icon="mail" heading="No invitations yet" sub='Use "Invite Admin" to onboard a new school.' />
          )}
          {invites.map(inv => {
            const s = inviteStatusBadge(inv.status);
            return (
              <div key={inv.id} style={{
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '14px 0', borderBottom: `1px solid ${C.border}`,
                flexWrap: isMobile ? 'wrap' : 'nowrap',
              }}>
                {/* Avatar initial */}
                <div style={{
                  width: 38, height: 38, borderRadius: '50%', background: C.orangeLight,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 15, fontWeight: 700, color: C.orange, flexShrink: 0,
                }}>
                  {(inv.name || inv.email)[0].toUpperCase()}
                </div>
                {/* Details */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 1 }}>
                    {inv.name || <span style={{ color: C.muted, fontStyle: 'italic' }}>Name not provided</span>}
                  </div>
                  <div style={{ fontSize: 12, color: C.muted, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {inv.email}{inv.org && inv.org !== '—' ? ` · ${inv.org}` : ''}
                  </div>
                </div>
                {/* Sent date */}
                <div style={{ fontSize: 12, color: C.muted, flexShrink: 0, display: isMobile ? 'none' : 'block' }}>
                  Sent {inv.sentAt}
                </div>
                {/* Status badge */}
                <Badge label={s.label} bg={s.bg} color={s.color} />
                {/* Actions */}
                <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                  {inv.status !== 'accepted' && (
                    <button onClick={() => handleResend(inv.id)} style={{
                      background: 'none', border: `1px solid ${C.border}`, borderRadius: 8,
                      padding: '4px 10px', fontSize: 12, cursor: 'pointer', color: C.text,
                      fontFamily: 'Satoshi, sans-serif', fontWeight: 500,
                    }}>Resend</button>
                  )}
                  {inv.status !== 'accepted' && (
                    <button onClick={() => handleRevoke(inv.id)} style={{
                      background: 'none', border: `1px solid ${C.border}`, borderRadius: 8,
                      padding: '4px 10px', fontSize: 12, cursor: 'pointer', color: C.danger,
                      fontFamily: 'Satoshi, sans-serif', fontWeight: 500,
                    }}>Revoke</button>
                  )}
                </div>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

// ── SCHOOL ADMIN DASHBOARD ───────────────────────────────────────────────────
function SchoolAdminDashboard({ setPage, runners, setMemberGroupFilter }) {
  const isMobile = useIsMobile();
  const upcomingEvents = EVENTS.filter(e => e.status === 'upcoming').slice(0, 3);
  const recentEvents = EVENTS.filter(e => e.status === 'completed').slice(0, 3);
  const liveRunners = runners || RUNNERS;
  const leader = liveRunners.reduce((best, r) => (!best || r.points > best.points) ? r : best, null);
  const leaderName = leader ? leader.name.split(' ')[0] + ' ' + leader.name.split(' ')[1]?.[0] + '.' : '—';
  const schoolOrg = ORGS.find(o => o.id === 1) || ORGS[0];

  return (
    <div className="fade-in">
      <div style={{ marginBottom: isMobile ? 16 : 28 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 10 }}>
          <OrgLogo org={schoolOrg} size={isMobile ? 44 : 52} />
          <div style={{ flex: 1 }}>
