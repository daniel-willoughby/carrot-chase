// ── RUN EVENT FLOW ───────────────────────────────────────────────────────────
function RunEventPage({ setPage, runners, setRunners, setRaceResult }) {
  const [runList, setRunList] = useState(runners.slice(0, 8));
  const RUN_RUNNERS = runList;
  const [step, setStep] = useState(1);
  const [attendance, setAttendance] = useState(
    Object.fromEntries(runners.slice(0, 8).map(r => [r.id, null]))
  );
  const [showLateModal, setShowLateModal] = useState(false);
  const [lateForm, setLateForm] = useState({ name: '' });
  const [groupStarted, setGroupStarted] = useState(0);
  const [countdown, setCountdown] = useState(null);
  const audioCtxRef = useRef(null);

  function getAudioCtx() {
    if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtxRef.current;
  }

  function playTone(freq, duration, gain = 0.18, type = 'sine', startOffset = 0) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const vol = ctx.createGain();
      osc.connect(vol);
      vol.connect(ctx.destination);
      osc.type = type;
      osc.frequency.value = freq;
      vol.gain.setValueAtTime(gain, ctx.currentTime + startOffset);
      vol.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startOffset + duration);
      osc.start(ctx.currentTime + startOffset);
      osc.stop(ctx.currentTime + startOffset + duration);
    } catch(e) {}
  }

  function playGroupStart() {
    // Three ascending beeps then a higher GO tone
    playTone(440, 0.12, 0.2, 'sine', 0.0);
    playTone(550, 0.12, 0.2, 'sine', 0.18);
    playTone(660, 0.12, 0.2, 'sine', 0.36);
    playTone(880, 0.35, 0.28, 'sine', 0.55);
  }

  function playCountdownTick() {
    playTone(330, 0.08, 0.08, 'sine');
  }

  const [tapTimes, setTapTimes] = useState([]);
  const [tapping, setTapping] = useState(false);
  const [positions, setPositions] = useState(Array(8).fill(null));
  const [selectedPos, setSelectedPos] = useState(0);
  const [assignedRunners, setAssignedRunners] = useState(new Set());
  const [dnfRunnerNames, setDnfRunnerNames] = useState(new Set());
  const [showDNFPicker, setShowDNFPicker] = useState(false);
  const [dnfPickerSel, setDnfPickerSel] = useState(new Set());
  const intervalRef = useRef(null);
  const [raceTime, setRaceTime] = useState(0);
  const raceRef = useRef(null);
  const raceStartRef = useRef(null);
  const tapCount = tapTimes.length;

  const presentRunners = RUN_RUNNERS.filter(r => attendance[r.id] === true);
  const presentCount = presentRunners.length;

  // Stagger groups — high level = slow = starts first; sorted within each bucket by carrotTarget (slowest first)
  const sortByTarget = arr => [...arr].sort((a, b) => (carrotTarget(b) || 999) - (carrotTarget(a) || 999));
  const groupSlow = sortByTarget(presentRunners.filter(r => r.level >= 65));   // L65–99: beginners, start first
  const groupMid  = sortByTarget(presentRunners.filter(r => r.level >= 45 && r.level < 65));
  const groupFast = sortByTarget(presentRunners.filter(r => r.level < 45));    // L1–44: elite, start last
  const startGroups = [groupSlow, groupMid, groupFast].filter(g => g.length > 0);

  // Dynamic stagger gap: difference between group average carrot targets, clamped 10–120s
  function staggerGap(gi) {
    if (gi + 1 >= startGroups.length) return 0;
    const avg = arr => arr.reduce((s, r) => s + (carrotTarget(r) || 420), 0) / arr.length;
    const slowAvg = avg(startGroups[gi]);
    const fastAvg = avg(startGroups[gi + 1]);
    return Math.min(120, Math.max(10, Math.round(slowAvg - fastAvg)));
  }

  useEffect(() => {
    if (step === 3) {
      raceStartRef.current = Date.now();
      raceRef.current = setInterval(() => setRaceTime(t => t + 1), 1000);
    }
    return () => { if (raceRef.current) clearInterval(raceRef.current); };
  }, [step]);

  useEffect(() => {
    if (countdown !== null && countdown > 0) {
      playCountdownTick();
      intervalRef.current = setTimeout(() => setCountdown(c => c - 1), 1000);
    }
    if (countdown === 0) { setCountdown(null); }
    return () => clearTimeout(intervalRef.current);
  }, [countdown]);

  function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function handleTap() {
    if (tapTimes.length >= presentCount) return;
    sfx.tap();
    setTapping(true);
    setTimeout(() => setTapping(false), 300);
    const elapsed = raceStartRef.current ? Math.round((Date.now() - raceStartRef.current) / 1000) : 0;
    setTapTimes(prev => [...prev, elapsed]);
  }

  function handleAssign(runnerName) {
    if (selectedPos === null) return;
    sfx.assign();
    const newPos = [...positions];
    // If this runner was already assigned elsewhere, free that slot
    const prevIdx = newPos.indexOf(runnerName);
    if (prevIdx !== -1) { newPos[prevIdx] = null; }
    // If the target position already has a different runner, free them
    const displaced = newPos[selectedPos];
    newPos[selectedPos] = runnerName;
    setPositions(newPos);
    const newAssigned = new Set(assignedRunners);
    if (displaced && displaced !== runnerName) newAssigned.delete(displaced);
    newAssigned.add(runnerName);
    setAssignedRunners(newAssigned);
    // Move to next empty
    const nextEmpty = newPos.findIndex((p, i) => i > selectedPos && p === null);
    setSelectedPos(nextEmpty === -1 ? null : nextEmpty);
    // If runner was previously DNF'd, clear that
    setDnfRunnerNames(prev => { const s = new Set(prev); s.delete(runnerName); return s; });
  }

  function handleMarkDNF(runnerName) {
    setDnfRunnerNames(prev => new Set([...prev, runnerName]));
  }

  function confirmDNFPicker() {
    // Mark selected runners as DNF
    setDnfRunnerNames(prev => new Set([...prev, ...dnfPickerSel]));
    // Fill remaining empty positions with __DNF__
    setPositions(prev => {
      const np = [...prev];
      for (let i = 0; i < tapCount; i++) {
        if (np[i] === null) np[i] = '__DNF__';
      }
      return np;
    });
    setShowDNFPicker(false);
    setDnfPickerSel(new Set());
  }

  function handleUndoDNF(runnerName) {
    setDnfRunnerNames(prev => { const s = new Set(prev); s.delete(runnerName); return s; });
  }

  const allMatched = positions.slice(0, presentCount).every(p => p !== null);
  const ordinalPos = (n) => {
    const s = ['th','st','nd','rd'];
    const v = n % 100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  };

  return (
    <div style={{ display: 'flex', justifyContent: 'center', padding: 24, minHeight: '100vh', background: C.bg }}>
      <div style={{ width: '100%', maxWidth: 480 }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
          <button
            onClick={() => { sfx.dismiss(); step === 1 ? setPage('events') : setStep(s => s - 1); }}
            style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 20, color: C.muted }}
          >
            ←
          </button>
          <div>
            <div style={{ fontWeight: 800, fontSize: 18 }}>Year 6 Pursuit Run #14</div>
            <div style={{ fontSize: 12, color: C.muted }}>
              Step {step} of 4 · {['Attendance', 'Start Order', 'Finish Recording', 'Name Match'][step-1]}
            </div>
          </div>
        </div>

        {/* Step progress bar */}
        <div style={{ display: 'flex', gap: 4, marginBottom: 24 }}>
          {[1,2,3,4].map(s => (
            <div key={s} style={{
              flex: 1, height: 4, borderRadius: 99,
              background: s <= step ? C.orange : C.border,
              transition: 'background 0.3s',
            }} />
          ))}
        </div>

        {/* ─ Step 1: Attendance ─ */}
        {step === 1 && (
          <div className="fade-in">
            <Card style={{ marginBottom: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                <div style={{ fontWeight: 700, fontSize: 16 }}>Mark Attendance</div>
                <div style={{
                  background: presentCount > 0 ? C.successLight : C.dangerLight,
                  color: presentCount > 0 ? C.success : C.danger,
                  borderRadius: 999, padding: '4px 12px', fontWeight: 700, fontSize: 14,
                }}>
                  {presentCount}/{RUN_RUNNERS.length} present
                </div>
              </div>
              <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 14 }}>
                <button
                  onClick={() => setAttendance(Object.fromEntries(RUN_RUNNERS.map(r => [r.id, true])))}
                  style={{
                    background: C.successLight, color: C.success, border: `1px solid ${C.success}`,
                    borderRadius: 8, padding: '5px 10px', fontSize: 11, fontWeight: 700,
                    cursor: 'pointer', fontFamily: 'Inter, sans-serif',
                  }}
                >
                  ✓ All present
                </button>
              </div>
              {runList.map(r => {
                const present = attendance[r.id] === true;
                const lc = levelColor(r.level);
                return (
                  <div
                    key={r.id}
                    onClick={() => { sfx.tick(); setAttendance(prev => ({ ...prev, [r.id]: prev[r.id] === true ? null : true })); }}
                    style={{
                      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                      padding: '11px 8px', borderBottom: `1px solid ${C.border}`,
                      cursor: 'pointer', borderRadius: 8,
                      background: present ? '#f0fdf4' : 'transparent',
                      marginLeft: -8, marginRight: -8,
                      transition: 'background 0.15s',
                    }}
                  >
                    {/* Left: level badge + name */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <div style={{
                        width: 36, height: 36, borderRadius: '50%', background: lc.bg,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontWeight: 700, fontSize: 12, color: lc.color, flexShrink: 0,
                      }}>L{r.level}</div>
                      <span style={{ fontWeight: 600, fontSize: 15, color: C.text }}>{r.name}</span>
                    </div>

                    {/* Right: tick */}
                    <span style={{
                      fontSize: 18, fontWeight: 700, flexShrink: 0, lineHeight: 1,
                      color: present ? C.success : '#e5e7eb',
                    }}>✓</span>
                  </div>
                );
              })}
            </Card>
            {/* Late arrival modal */}
            {showLateModal && (
              <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '64px 16px 16px', overflowY: 'auto' }}>
                <div style={{ background: C.white, borderRadius: 20, padding: 24, width: '100%', maxWidth: 360, boxShadow: '0 8px 40px rgba(0,0,0,0.18)' }} onClick={e => e.stopPropagation()}>
                  <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 4 }}>Late Arrival</div>
                  <div style={{ fontSize: 13, color: C.muted, marginBottom: 16 }}>Add a runner who turned up after registration closed.</div>
                  <label style={{ fontSize: 13, fontWeight: 600, display: 'block', marginBottom: 6 }}>Full name</label>
                  <input
                    value={lateForm.name}
                    onChange={e => setLateForm({ name: e.target.value })}
                    placeholder="e.g. Mia Robinson"
                    autoCapitalize="words"
                    style={{ width: '100%', padding: '10px 14px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Inter', marginBottom: 16, boxSizing: 'border-box' }}
                    autoFocus
                  />
                  <div style={{ display: 'flex', gap: 10 }}>
                    <Button style={{ flex: 1 }} disabled={!lateForm.name.trim()}
                      onClick={() => {
                        const newR = { id: `LATE-${Date.now()}`, name: lateForm.name.trim(), level: 99, pb: '—', groups: [], streak: 0, points: 0, times: [420,420,420,420,420], badges: [] };
                        setRunList(prev => [...prev, newR]);
                        setAttendance(prev => ({ ...prev, [newR.id]: true }));
                        setLateForm({ name: '' });
                        setShowLateModal(false);
                      }}>
                      Add &amp; Mark Present
                    </Button>
                    <Button variant="secondary" style={{ flex: 1 }} onClick={() => { setShowLateModal(false); setLateForm({ name: '' }); }}>Cancel</Button>
                  </div>
                </div>
              </div>
            )}
            <div style={{ display: 'flex', gap: 10, marginTop: 4 }}>
              <Button
                variant="secondary"
                style={{ flex: 'none' }}
                onClick={() => setShowLateModal(true)}
              >
                + Late arrival
              </Button>
              <Button
                size="xl"
                style={{ flex: 1, justifyContent: 'center' }}
                onClick={() => setStep(2)}
                disabled={presentCount < 2}
              >
                Begin Race ({presentCount} runners) →
              </Button>
            </div>
          </div>
        )}

        {/* ─ Step 2: Start Order ─ */}
        {step === 2 && (
          <div className="fade-in">
            <div style={{ marginBottom: 16, color: C.muted, fontSize: 14 }}>
              Pursuit stagger: slower runners start first for a fair finish.
            </div>
            {startGroups.map((grp, gi) => {
              const started = groupStarted > gi;
              const current = groupStarted === gi;
              const waiting = groupStarted < gi;
              return (
                <Card key={gi} style={{ marginBottom: 16, opacity: waiting ? 0.5 : 1 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>
                      Group {gi + 1} {gi === 0 ? '(Slowest, first to start)' : gi === startGroups.length - 1 ? '(Fastest, last to start)' : '(Middle)'}
                    </div>
                    {started && <Badge label="Started ✓" bg={C.successLight} color={C.success} />}
                  </div>
                  {grp.map(r => {
                    const lc = levelColor(r.level);
                    return (
                      <div key={r.id} style={{
                        display: 'flex', alignItems: 'center', gap: 10,
                        padding: '6px 0', borderBottom: `1px solid ${C.border}`,
                      }}>
                        <span style={{
                          background: lc.bg, color: lc.color, borderRadius: 999,
                          padding: '2px 8px', fontSize: 12, fontWeight: 700,
                        }}>L{r.level}</span>
                        <span style={{ fontWeight: 600, fontSize: 14 }}>{r.name}</span>
                        <span style={{ fontSize: 11, color: C.muted, marginLeft: 'auto' }}>🎯 {fmtSecs(carrotTarget(r))}</span>
                      </div>
                    );
                  })}

                  {current && countdown === null && (
                    <Button
                      size="lg"
                      style={{ width: '100%', justifyContent: 'center', marginTop: 16 }}
                      onClick={() => {
                        playGroupStart();
                        setGroupStarted(gi + 1);
                        const gap = staggerGap(gi);
                        if (gi + 1 < startGroups.length) { setCountdown(gap); }
                        else { setStep(3); }
                      }}
                    >
                      START GROUP {gi + 1}
                    </Button>
                  )}
                  {current && countdown !== null && (
                    <div style={{
                      marginTop: 16, textAlign: 'center', padding: 16,
                      background: C.orangeLight, borderRadius: 12,
                    }}>
                      <div style={{ fontSize: 12, color: C.muted, marginBottom: 4 }}>GROUP {gi + 1} STARTS IN · {staggerGap(gi - 1)}s gap based on pace</div>
                      <div style={{ fontSize: 40, fontWeight: 800, color: C.orange, fontVariantNumeric: 'tabular-nums' }}>
                        {fmtTime(countdown)}
                      </div>
                      <button onClick={() => setCountdown(0)} style={{ marginTop: 8, fontSize: 11, color: C.muted, background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline' }}>skip countdown</button>
                    </div>
                  )}
                </Card>
              );
            })}
            {groupStarted === startGroups.length && countdown === null && (
              <Button size="xl" style={{ width: '100%', justifyContent: 'center' }} onClick={() => setStep(3)}>
                All groups started → Begin Recording
              </Button>
            )}
          </div>
        )}

        {/* ─ Step 3: Finish Recording ─ */}
        {step === 3 && (
          <div className="fade-in">
            <Card style={{ marginBottom: 16, textAlign: 'center' }}>
              <div style={{ fontSize: 13, color: C.muted, marginBottom: 4 }}>Race time</div>
              <div style={{ fontSize: 48, fontWeight: 800, fontVariantNumeric: 'tabular-nums', color: C.text }}>
                {fmtTime(raceTime)}
              </div>
            </Card>

            <button
              onClick={handleTap}
              disabled={tapCount >= presentCount}
              style={{
                width: '100%', padding: '36px 24px', borderRadius: 20,
                background: tapCount >= presentCount ? '#ccc' : C.orange,
                color: C.white, fontSize: 22, fontWeight: 800, border: 'none',
                cursor: tapCount >= presentCount ? 'default' : 'pointer',
                fontFamily: 'Inter, sans-serif', marginBottom: 16,
                animation: tapping ? 'flash 0.3s ease' : 'none',
                boxShadow: '0 4px 20px rgba(212,82,10,0.35)',
                transition: 'background 0.15s',
              }}
            >
              {tapCount >= presentCount ? '✓ All runners accounted for!' : 'TAP WHEN RUNNER FINISHES'}
            </button>

            {tapCount > 0 && (
              <Card style={{ marginBottom: 16, textAlign: 'center' }}>
                <div style={{ fontSize: 40, fontWeight: 800, color: C.orange }}>{tapCount}</div>
                <div style={{ color: C.muted, fontSize: 14 }}>
                  {tapCount === 1 ? 'finisher recorded' : 'finishers recorded'}
                </div>
                <div style={{ marginTop: 12, display: 'flex', flexWrap: 'wrap', gap: 6, justifyContent: 'center' }}>
                  {tapTimes.map((t, i) => (
                    <span key={i} style={{
                      background: C.orangeLight, color: C.orange, borderRadius: 999,
                      padding: '2px 10px', fontSize: 13, fontWeight: 700,
                    }}>
                      {ordinalPos(i + 1)} · {fmtSecs(t)}
                    </span>
                  ))}
                </div>
              </Card>
            )}

            {tapCount >= presentCount && (
              <Button
                size="xl"
                style={{ width: '100%', justifyContent: 'center' }}
                onClick={() => setStep(4)}
              >
                Match Names →
              </Button>
            )}
          </div>
        )}

        {/* ─ Step 4: Name Match ─ */}
        {step === 4 && (() => {
          const allRunnersAccountedFor = presentRunners.every(r =>
            assignedRunners.has(r.name) || dnfRunnerNames.has(r.name)
          );
          const allPositionsFilled = positions.slice(0, tapCount).every(p => p !== null);
          const allResolved = allRunnersAccountedFor && allPositionsFilled;
          const unaccountedRunners = presentRunners.filter(r =>
            !assignedRunners.has(r.name) && !dnfRunnerNames.has(r.name)
          );
          const emptyPositions = positions.slice(0, tapCount).filter(p => p === null).length;
          const finisherPositionsFilled = positions.slice(0, tapCount).filter(p => p !== null && p !== '__DNF__').length;

          return (
          <div className="fade-in">
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>Match finish positions to runners</div>
            <div style={{ fontSize: 12, color: C.muted, marginBottom: 16 }}>Tap a position to select or unassign it, then tap a runner to assign.</div>
            <div style={{ display: 'grid', gridTemplateColumns: '45% 55%', gap: 8, marginBottom: 16 }}>
              {/* Positions */}
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, marginBottom: 8, textTransform: 'uppercase' }}>Positions</div>
                {tapTimes.map((t, i) => {
                  const isDNF = positions[i] === '__DNF__';
                  const isSel = selectedPos === i;
                  const hasName = positions[i] && !isDNF;
                  return (
                    <div key={i} style={{ marginBottom: 6 }}>
                      <div
                        onClick={() => {
                          if (isDNF) {
                            const np=[...positions]; np[i]=null; setPositions(np); setSelectedPos(i); return;
                          }
                          if (hasName) {
                            // Unassign: clear position AND free the runner on the right
                            const removedName = positions[i];
                            const np=[...positions]; np[i]=null; setPositions(np); setSelectedPos(i);
                            setAssignedRunners(prev => { const s = new Set(prev); s.delete(removedName); return s; });
                            return;
                          }
                          setSelectedPos(i);
                        }}
                        style={{
                          padding: '8px 10px', borderRadius: 10,
                          border: `2px solid ${isSel ? C.orange : isDNF ? C.danger : hasName ? C.success : C.border}`,
                          background: isDNF ? C.dangerLight : isSel ? C.orangeLight : hasName ? C.successLight : C.white,
                          cursor: 'pointer', fontSize: 13,
                          display: 'flex', alignItems: 'center', gap: 6,
                        }}
                      >
                        <span style={{ fontWeight: 700, color: isDNF ? C.danger : hasName ? C.success : C.orange, minWidth: 26, fontSize: 12 }}>{ordinalPos(i+1)}</span>
                        <span style={{ flex: 1, fontWeight: 600, color: hasName ? C.text : C.muted, fontSize: 12,
                          overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis' }}>
                          {isDNF ? 'DNF' : positions[i] || '—'}
                        </span>
                        <span style={{ fontSize: 10, color: C.muted, flexShrink: 0 }}>{fmtSecs(t)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Runners — no inline DNF buttons */}
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, marginBottom: 8, textTransform: 'uppercase' }}>Runners</div>
                {[...presentRunners].sort((a,b) => a.name.localeCompare(b.name)).map(r => {
                  const isAssigned = assignedRunners.has(r.name);
                  const isDNF = dnfRunnerNames.has(r.name);
                  return (
                    <div key={r.id} style={{ marginBottom: 6 }}>
                      <div onClick={() => !isAssigned && !isDNF && handleAssign(r.name)} style={{
                        padding: '10px 8px', borderRadius: 10,
                        border: `2px solid ${isDNF ? C.danger : isAssigned ? '#e5e7eb' : C.border}`,
                        background: isDNF ? C.dangerLight : isAssigned ? '#f9fafb' : C.white,
                        cursor: isAssigned || isDNF ? 'default' : 'pointer', fontSize: 13,
                        opacity: isAssigned || isDNF ? 0.45 : 1,
                        textDecoration: isAssigned || isDNF ? 'line-through' : 'none',
                        fontWeight: 500, color: isDNF ? C.danger : C.text,
                        display: 'flex', alignItems: 'center',
                        overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis',
                      }}>
                        {r.name}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* DNF Picker */}
            {showDNFPicker && (
              <div style={{ background: C.dangerLight, border: `1.5px solid ${C.danger}`, borderRadius: 14, padding: 16, marginBottom: 14 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: C.danger, marginBottom: 10 }}>Who didn't finish?</div>
                {unaccountedRunners.length === 0
                  ? <div style={{ fontSize: 13, color: C.muted }}>All runners are accounted for.</div>
                  : unaccountedRunners.map(r => {
                    const sel = dnfPickerSel.has(r.name);
                    return (
                      <label key={r.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '7px 0',
                        borderBottom: `1px solid rgba(220,38,38,0.15)`, cursor: 'pointer' }}>
                        <input type="checkbox" checked={sel}
                          onChange={() => setDnfPickerSel(prev => {
                            const s = new Set(prev);
                            sel ? s.delete(r.name) : s.add(r.name);
                            return s;
                          })}
                          style={{ width: 16, height: 16, accentColor: C.danger, cursor: 'pointer' }}
                        />
                        <span style={{ fontSize: 14, fontWeight: 600 }}>{r.name}</span>
                      </label>
                    );
                  })
                }
                <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
                  <Button onClick={confirmDNFPicker} style={{ flex: 1, background: C.danger, justifyContent: 'center' }}>
                    Confirm DNF{dnfPickerSel.size > 0 ? ` (${dnfPickerSel.size})` : ''}
                  </Button>
                  <Button variant="secondary" onClick={() => { setShowDNFPicker(false); setDnfPickerSel(new Set()); }}>
                    Cancel
                  </Button>
                </div>
              </div>
            )}

            {!showDNFPicker && unaccountedRunners.length > 0 && (
              <Button
                variant="outline"
                style={{ width: '100%', justifyContent: 'center', marginBottom: 12, borderColor: C.danger, color: C.danger }}
                onClick={() => { setShowDNFPicker(true); setDnfPickerSel(new Set()); }}
              >
                Mark DNF ({unaccountedRunners.length} runner{unaccountedRunners.length !== 1 ? 's' : ''} unaccounted)
              </Button>
            )}

            {!allResolved && (() => {
              const parts = [];
              if (emptyPositions > 0) parts.push(`${emptyPositions} position${emptyPositions !== 1 ? 's' : ''} unassigned`);
              if (unaccountedRunners.length > 0) parts.push(`${unaccountedRunners.length} runner${unaccountedRunners.length !== 1 ? 's' : ''} need${unaccountedRunners.length === 1 ? 's' : ''} assigning or DNF`);
              return (
                <div style={{
                  background: C.warningLight, border: `1px solid #fde68a`, borderRadius: 10,
                  padding: '10px 14px', marginBottom: 12, fontSize: 13, color: C.warning, fontWeight: 600,
                }}>
                  ⚠ {parts.join(' · ')}
                </div>
              );
            })()}
            <Button size="xl" style={{ width: '100%', justifyContent: 'center' }} disabled={!allResolved}
              onClick={() => {
                // Build stagger offsets per runner: raceStartRef fires when LAST group starts.
                // Earlier groups (slower) started before the timer, so add their head-start back.
                // Last group (index N-1) = 0 offset; first group (index 0) = sum of all gaps.
                const groupOffsets = startGroups.map((_, gi) => {
                  let offset = 0;
                  for (let j = gi; j < startGroups.length - 1; j++) offset += staggerGap(j);
                  return offset;
                });
                const runnerGroupIdx = (runner) => startGroups.findIndex(g => g.some(r => r.id === runner.id));

                const finishers = tapTimes.map((rawTime, i) => {
                  const name = positions[i];
                  if (name === '__DNF__' || !name) return { pos: i + 1, runnerId: null, rawTime, adjTime: rawTime, dnf: true };
                  const runner = presentRunners.find(r => r.name === name);
                  if (!runner) return { pos: i + 1, runnerId: null, rawTime, adjTime: rawTime, dnf: false };
                  const gIdx = runnerGroupIdx(runner);
                  const adjTime = rawTime + (groupOffsets[gIdx] || 0);
                  return { pos: i + 1, runnerId: runner.id, runnerName: name, rawTime, adjTime, dnf: false };
                });

                // Unmatched present runners = DNF
                const matchedIds = new Set(finishers.filter(f => f.runnerId).map(f => f.runnerId));
                const dnfRunners = presentRunners.filter(r => !matchedIds.has(r.id));
                const allFinishers = [...finishers, ...dnfRunners.map(r => ({ runnerId: r.id, runnerName: r.name, dnf: true }))];

                // DNS runners = those marked absent
                const dnsRunners = RUN_RUNNERS.filter(r => attendance[r.id] !== true);

                setRaceResult({ finishers: allFinishers, presentRunners, dnsRunners, startGroups, staggerFn: staggerGap });
                setPage('results');
              }}>
              Confirm Results →
            </Button>
          </div>
          );
        })()}
      </div>
    </div>
  );
}

function Confetti() {
  const pieces = Array.from({ length: 60 }).map((_, i) => ({
    id: i,
    left: Math.random() * 100,
    delay: Math.random() * 3,
    duration: 2.5 + Math.random() * 2,
    color: ['#D4520A','#FFB347','#FF6B6B','#4CAF50','#2196F3','#9C27B0','#FFD700'][Math.floor(Math.random()*7)],
    size: 6 + Math.random() * 8,
    rotate: Math.random() * 360,
  }));

  return (
    <>
      {pieces.map(p => (
        <div
          key={p.id}
          className="confetti-piece"
          style={{
            left: `${p.left}%`,
            top: -20,
            width: p.size,
            height: p.size,
            background: p.color,
            borderRadius: Math.random() > 0.5 ? '50%' : 2,
            animationDelay: `${p.delay}s`,
            animationDuration: `${p.duration}s`,
            transform: `rotate(${p.rotate}deg)`,
          }}
        />
      ))}
    </>
  );
}

function ResultsPage({ setPage, runners, setRunners, raceResult }) {
  const [showConf, setShowConf] = useState(true);
  const [committed, setCommitted] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [customOrder, setCustomOrder] = useState(null); // null = auto sort; array of runnerId strings = manual order
  const [dsqSet, setDsqSet] = useState(new Set());
  const isMobile = useIsMobile();
  useEffect(() => { const t = setTimeout(() => setShowConf(false), 5000); return () => clearTimeout(t); }, []);
  useEffect(() => { sfx.fanfare(); }, []);

  // ── Compute results from real race data (or fall back to mock) ───────────────
  const computed = React.useMemo(() => {
    if (!raceResult) return null;
    const { finishers, presentRunners, dnsRunners = [] } = raceResult;

    // Build ordered list: customOrder overrides adjTime sort
    let sorted;
    if (customOrder) {
      // Reconstruct finishers in customOrder sequence; append any not listed at the end
      const byId = Object.fromEntries(finishers.map(f => [f.runnerId, f]));
      const ordered = customOrder.map(id => byId[id]).filter(Boolean);
      const rest = finishers.filter(f => !customOrder.includes(f.runnerId));
      sorted = [...ordered, ...rest];
    } else {
      sorted = [...finishers].sort((a, b) => {
        if (a.dnf && !b.dnf) return 1;
        if (!a.dnf && b.dnf) return -1;
        return (a.adjTime || 0) - (b.adjTime || 0);
      });
    }

    const results = sorted.map((f, rankIdx) => {
      // Fall back to presentRunners for late arrivals not in global runners state
      const runner = runners.find(r => r.id === f.runnerId) || presentRunners.find(r => r.id === f.runnerId);
      if (!runner) return null;
      const isDSQ = dsqSet.has(f.runnerId);
      const target = carrotTarget(runner);
      // DSQ runners get 0 pts and no level change
      const pts = isDSQ ? 0 : f.dnf ? 20 : posPoints(rankIdx);

      // Level change (DSQ = no change, same as DNF branch)
      let levelDelta = 0;
      if (!f.dnf && !isDSQ && target && f.adjTime) {
        // Level 1 = elite, 99 = beginner → beating target DECREASES level (improves)
        if (f.adjTime < target - 5) levelDelta = -2;        // beat target well → drop 2 levels
        else if (f.adjTime <= target + 15) levelDelta = -1; // near target → drop 1 level
        else if (f.adjTime > target + 30) levelDelta = 1;   // missed target → rise 1 level (regression)
      }

      // New PB?
      const pbSecs = runner.pb && runner.pb !== '—' ? parseInt(runner.pb.split(':')[0])*60 + parseInt(runner.pb.split(':')[1]) : Infinity;
      const newPB = !f.dnf && f.adjTime && f.adjTime < pbSecs;

      // Badges earned this race
      const BADGE_RULES = [
        { id: 'first_finish', label: 'First Finish', check: () => runner.streak === 0 },
        { id: 'pb_setter',    label: 'PB Setter',    check: () => newPB },
        { id: 'streak_5',     label: '🔥 5-Event Streak', check: () => (runner.streak + 1) >= 5 },
        { id: 'streak_10',    label: '🔥 10-Event Streak', check: () => (runner.streak + 1) >= 10 },
        { id: 'top_3',        label: 'Top 3',        check: () => !f.dnf && rankIdx < 3 },
        { id: 'consistent',   label: 'Consistent',   check: () => !f.dnf && target && Math.abs(f.adjTime - target) <= 10 },
      ];
      const newBadges = isDSQ ? [] : BADGE_RULES.filter(b => b.check() && !(runner.badges || []).includes(b.label)).map(b => b.label);

      return { runner, f, rankIdx, pts, levelDelta, newPB, newBadges, isDSQ, newLevel: Math.max(1, Math.min(99, runner.level + levelDelta)) };
    }).filter(Boolean);

    // Most improved = highest positive levelDelta
    const mostImproved = [...results].sort((a, b) => a.levelDelta - b.levelDelta)[0]; // most negative = most improved

    return { results, mostImproved };
  }, [raceResult, runners, customOrder, dsqSet]);

  // ── Commit results to runners state (once) ───────────────────────────────────
  function commitResults() {
    if (!computed || committed) return;
    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const ordinal = n => n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : `${n}th`;
    const updated = runners.map(r => {
      const res = computed.results.find(x => x.runner.id === r.id);
      if (!res) return r;
      const newTimes = res.f.adjTime ? [...(r.times || []).slice(-4), res.f.adjTime] : r.times;
      const pbSecs = r.pb && r.pb !== '—' ? parseInt(r.pb.split(':')[0])*60 + parseInt(r.pb.split(':')[1]) : Infinity;
      const newPbSecs = res.newPB && res.f.adjTime ? res.f.adjTime : pbSecs;
      const newPb = newPbSecs < Infinity ? fmtSecs(newPbSecs) : r.pb;
      const histEntry = (!res.f.dnf && !res.isDSQ && res.f.adjTime) ? {
        date: today,
        event: 'Race',
        pos: ordinal(res.rankIdx + 1),
        time: fmtSecs(res.f.adjTime),
        pts: res.pts,
      } : null;
      return {
        ...r,
        level: res.newLevel,
        points: r.points + res.pts,
        streak: (res.f.dnf || res.isDSQ) ? r.streak : r.streak + 1,
        times: newTimes,
        pb: newPb,
        badges: [...new Set([...(r.badges || []), ...res.newBadges])],
        history: histEntry ? [histEntry, ...(r.history || [])].slice(0, 10) : (r.history || []),
      };
    });
    setRunners(updated);
    setCommitted(true);
  }

  // ── Fallback mock if no raceResult ────────────────────────────────────────────
  const mockPodium = [
    { name: 'Liam Brown',     adjTime: 318, levelDelta: 2, newLevel: 73, pts: 200, newBadges: [], dnf: false },
    { name: 'James Anderson', adjTime: 299, levelDelta: 1, newLevel: 79, pts: 170, newBadges: [], dnf: false },
    { name: 'Noah Wilson',    adjTime: 354, levelDelta: 1, newLevel: 56, pts: 145, newBadges: [], dnf: false },
  ];

  const displayResults = computed ? computed.results : mockPodium.map((m, i) => ({
    runner: runners.find(r => r.name === m.name) || runners[i],
    f: { adjTime: m.adjTime, dnf: false }, rankIdx: i, ...m,
  }));

  const top3 = displayResults.filter(r => !r.isDSQ).slice(0, 3);
  const rest = displayResults.filter(r => !r.isDSQ).slice(3);
  const mostImproved = computed?.mostImproved || (displayResults[0] ? displayResults[0] : null);
  const newBadgesAll = displayResults.flatMap(r => (r.newBadges || []).map(b => ({ badge: b, name: r.runner?.name })));

  // Edit-order helpers
  function startEdit() {
    if (!computed) return;
    setCustomOrder(computed.results.map(r => r.f.runnerId));
    setEditMode(true);
  }
  function cancelEdit() {
    setCustomOrder(null);
    setDsqSet(new Set());
    setEditMode(false);
  }
  function moveRunner(idx, dir) {
    if (!customOrder) return;
    const next = [...customOrder];
    const swap = idx + dir;
    if (swap < 0 || swap >= next.length) return;
    [next[idx], next[swap]] = [next[swap], next[idx]];
    setCustomOrder(next);
  }
  function toggleDSQ(runnerId) {
    setDsqSet(prev => {
      const s = new Set(prev);
      if (s.has(runnerId)) s.delete(runnerId); else s.add(runnerId);
      return s;
    });
  }

  return (
    <div style={{ display: 'flex', justifyContent: 'center', padding: isMobile ? '16px 12px' : 24, minHeight: '100vh', background: C.bg }}>
      {showConf && <Confetti />}
      <div style={{ width: '100%', maxWidth: 520 }}>
        <div style={{ textAlign: 'center', marginBottom: 28 }}>
          <div style={{ fontSize: 56, marginBottom: 8 }}>🎉</div>
          <h1 style={{ fontSize: 28, fontWeight: 800 }}>Race Complete!</h1>
          <div style={{ color: C.muted, marginTop: 4 }}>Pursuit Run · {new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
        </div>

        {/* Podium */}
        {top3.length >= 2 && (
          <Card style={{ marginBottom: 20 }}>
            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'flex-end', gap: 12, marginBottom: 20 }}>
              {[top3[1], top3[0], top3[2]].map((item, pi) => {
                if (!item) return <div key={pi} style={{ flex: 1 }} />;
                const heights = [60, 80, 45];
                const bgs = ['#C0C0C0', '#FFD700', '#CD7F32'];
                const medals = ['🥈', '🥇', '🥉'];
                const labels = ['2nd', '1st', '3rd'];
                return (
                  <div key={pi} style={{ textAlign: 'center', flex: 1 }}>
                    <div style={{ fontSize: pi === 1 ? 40 : 32 }}>{medals[pi]}</div>
                    <div style={{
                      background: bgs[pi], height: heights[pi], borderRadius: '8px 8px 0 0',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: C.white, fontWeight: 700, fontSize: 13,
                    }}>{labels[pi]}</div>
                    <div style={{ fontWeight: 700, fontSize: 13, marginTop: 6 }}>{item.runner?.name?.split(' ')[0]}</div>
                    {item.f?.adjTime && <div style={{ fontSize: 11, color: C.muted }}>{fmtSecs(item.f.adjTime)}</div>}
                  </div>
                );
              })}
            </div>
          </Card>
        )}

        {/* Level updates / Edit order */}
        <Card style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <div style={{ fontWeight: 700, fontSize: 16 }}>{editMode ? 'Edit Finish Order' : 'Level Updates'}</div>
            {computed && !committed && (
              editMode ? (
                <div style={{ display: 'flex', gap: 8 }}>
                  <button onClick={cancelEdit} style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8, padding: '4px 12px', fontSize: 12, cursor: 'pointer', color: C.muted }}>Cancel</button>
                  <button onClick={() => setEditMode(false)} style={{ background: C.orange, border: 'none', borderRadius: 8, padding: '4px 12px', fontSize: 12, fontWeight: 700, cursor: 'pointer', color: C.white }}>Done</button>
                </div>
              ) : (
                <button onClick={startEdit} style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8, padding: '4px 12px', fontSize: 12, cursor: 'pointer', color: C.muted, fontFamily: 'Inter, sans-serif' }}>
                  ✏️ Edit Order
                </button>
              )
            )}
          </div>

          {editMode ? (
            /* ── Edit mode: drag-free reorder with ↑↓ and DNF toggle ─────── */
            <div>
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 10 }}>Use ↑↓ to reorder. Mark DNF to remove a runner — zero points, no level change.</div>
              {displayResults.map((item, i) => {
                const r = item.runner;
                if (!r) return null;
                const isDSQed = item.isDSQ;
                return (
                  <div key={r.id} style={{
                    display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0',
                    borderBottom: `1px solid ${C.border}`,
                    opacity: isDSQed ? 0.5 : 1,
                  }}>
                    {/* Reorder arrows */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                      <button onClick={() => moveRunner(i, -1)} disabled={i === 0 || isDSQed}
                        style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 4, width: 22, height: 20, fontSize: 10, cursor: 'pointer', display:'flex', alignItems:'center', justifyContent:'center', opacity: (i === 0 || isDSQed) ? 0.3 : 1 }}>▲</button>
                      <button onClick={() => moveRunner(i, 1)} disabled={i === displayResults.length - 1 || isDSQed}
                        style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 4, width: 22, height: 20, fontSize: 10, cursor: 'pointer', display:'flex', alignItems:'center', justifyContent:'center', opacity: (i === displayResults.length - 1 || isDSQed) ? 0.3 : 1 }}>▼</button>
                    </div>
                    {/* Position + name */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, flex: 1, minWidth: 0 }}>
                      <span style={{ fontSize: 13, color: C.muted, minWidth: 20 }}>{isDSQed ? 'DNF' : i + 1}</span>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontWeight: 600, fontSize: 14, textDecoration: isDSQed ? 'line-through' : 'none' }}>{r.name}</div>
                        {item.f?.adjTime && !item.f.dnf && <div style={{ fontSize: 11, color: C.muted }}>{fmtSecs(item.f.adjTime)}</div>}
                        {item.f?.dnf && <div style={{ fontSize: 11, color: C.danger }}>DNF</div>}
                      </div>
                    </div>
                    {/* DSQ toggle */}
                    <button onClick={() => toggleDSQ(item.f.runnerId)} style={{
                      background: isDSQed ? C.dangerLight : 'none',
                      border: `1px solid ${isDSQed ? C.danger : C.border}`,
                      color: isDSQed ? C.danger : C.muted,
                      borderRadius: 8, padding: '3px 10px', fontSize: 11, fontWeight: 700, cursor: 'pointer',
                    }}>{isDSQed ? 'Undo DNF' : 'DNF'}</button>
                  </div>
                );
              })}
            </div>
          ) : (
            /* ── Normal results view ─────────────────────────────────────── */
            displayResults.map((item, i) => {
              const r = item.runner;
              if (!r) return null;
              const lc = levelColor(r.level);
              const nonDSQIndex = displayResults.filter(x => !x.isDSQ).indexOf(item);
              const medals = { 0: '🥇', 1: '🥈', 2: '🥉' };
              return (
                <div key={i} style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  padding: '8px 0', borderBottom: `1px solid ${C.border}`,
                  opacity: item.isDSQ ? 0.5 : 1,
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 16, minWidth: 28 }}>
                      {item.isDSQ ? '🚫' : (medals[nonDSQIndex] !== undefined ? medals[nonDSQIndex] : `${nonDSQIndex + 1}`)}
                    </span>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{r.name}</div>
                      {item.isDSQ && <div style={{ fontSize: 11, color: C.danger, fontWeight: 700 }}>DNF</div>}
                      {!item.isDSQ && item.f?.adjTime && !item.f.dnf && <div style={{ fontSize: 11, color: C.muted }}>{fmtSecs(item.f.adjTime)} adjusted</div>}
                      {!item.isDSQ && item.f?.dnf && <div style={{ fontSize: 11, color: C.danger }}>DNF</div>}
                    </div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ background: lc.bg, color: lc.color, borderRadius: 999, padding: '2px 8px', fontSize: 12, fontWeight: 700 }}>L{r.level}</span>
                    <span>→</span>
                    <span style={{
                      background: item.levelDelta < 0 ? C.successLight : item.levelDelta > 0 ? C.dangerLight : '#f3f4f6',
                      color: item.levelDelta < 0 ? C.success : item.levelDelta > 0 ? C.danger : C.muted,
                      borderRadius: 999, padding: '2px 8px', fontSize: 12, fontWeight: 700,
                    }}>L{item.newLevel} {item.levelDelta < 0 ? `↑${Math.abs(item.levelDelta)}` : item.levelDelta > 0 ? `↓${item.levelDelta}` : '—'}</span>
                  </div>
                </div>
              );
            })
          )}
        </Card>

        {/* Most improved */}
        {mostImproved && mostImproved.levelDelta < 0 && (
          <Card style={{ background: C.orangeLight, marginBottom: 20 }}>
            <div style={{ fontWeight: 700, fontSize: 14, color: C.orange, marginBottom: 4 }}>⭐ Most Improved</div>
            <div style={{ fontWeight: 800, fontSize: 18 }}>{mostImproved.runner?.name}</div>
            <div style={{ fontSize: 13, color: C.muted, marginTop: 2 }}>
              L{mostImproved.runner?.level} → L{mostImproved.newLevel} · ↑{Math.abs(mostImproved.levelDelta)} level{Math.abs(mostImproved.levelDelta) > 1 ? 's' : ''} · {mostImproved.pts} pts earned
            </div>
          </Card>
        )}

        {/* Badges earned */}
        {newBadgesAll.length > 0 && (
          <Card style={{ marginBottom: 20 }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 12 }}>Badges Earned</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
              {newBadgesAll.map((b, i) => (
                <div key={i} style={{ background: C.orangeLight, borderRadius: 12, padding: '8px 14px', fontSize: 13, fontWeight: 600, color: C.orange }}>
                  {b.badge} <span style={{ fontWeight: 400, color: C.muted, fontSize: 12 }}>{b.name?.split(' ')[0]}</span>
                </div>
              ))}
            </div>
          </Card>
        )}

        {/* DNS runners */}
        {raceResult?.dnsRunners?.length > 0 && (
          <Card style={{ marginBottom: 20, background: '#fafafa' }}>
            <div style={{ fontWeight: 700, fontSize: 14, color: C.muted, marginBottom: 8 }}>Did Not Start (DNS)</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {raceResult.dnsRunners.map(r => (
                <span key={r.id} style={{
                  background: '#f3f4f6', color: C.muted, borderRadius: 999,
                  padding: '4px 12px', fontSize: 13, fontWeight: 600,
                }}>
                  {r.name}
                </span>
              ))}
            </div>
          </Card>
        )}

        {/* Series Standings */}
        {committed && (
          <Card style={{ marginBottom: 20, background: '#fffbeb', border: `1px solid #fde68a` }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 4 }}>📊 Series Standings</div>
            <div style={{ fontSize: 12, color: C.muted, marginBottom: 12 }}>Cumulative points after today's event</div>
            {[...runners].sort((a, b) => b.points - a.points).slice(0, 5).map((r, i) => {
              const medals = ['🥇', '🥈', '🥉'];
              const isInRace = computed?.results.some(x => x.runner.id === r.id);
              return (
                <div key={r.id} style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  padding: '6px 0', borderBottom: `1px solid #fde68a`, fontSize: 14,
                }}>
                  <span style={{ width: 24, textAlign: 'center', fontWeight: 700, color: i < 3 ? C.orange : C.muted }}>
                    {medals[i] || `${i + 1}`}
                  </span>
                  <span style={{ flex: 1, fontWeight: 600 }}>{r.name}</span>
                  {isInRace && <span style={{ fontSize: 11, color: C.success, fontWeight: 600 }}>↑ today</span>}
                  <span style={{ fontWeight: 800, color: C.orange }}>{r.points.toLocaleString()} pts</span>
                </div>
              );
            })}
          </Card>
        )}

        {/* Actions */}
        <div style={{ display: 'flex', gap: 12 }}>
          <Button size="lg" style={{ flex: 1, justifyContent: 'center' }} onClick={() => { sfx.confirm(); commitResults(); setPage('dashboard'); }}>
            Save & Done
          </Button>
          <Button size="lg" variant="outline" style={{ flex: 1, justifyContent: 'center' }} onClick={() => { sfx.confirm(); commitResults(); setPage('leaderboard'); }}>
            Save & View Leaderboard
          </Button>
        </div>
        {committed && <div style={{ textAlign: 'center', fontSize: 12, color: C.success, marginTop: 12 }}>✓ Results saved — levels, points and badges updated</div>}
      </div>
    </div>
  );
}

// ── RUNNER PROFILE ───────────────────────────────────────────────────────────

              }}>
                Level {runner.level}
              </div>
              {rGroups(runner).map(g => <Badge key={g} label={g} bg={C.orangeLight} color={C.orange} />)}
            </div>

        </div>

                </td>
                <td style={{ padding: '9px 8px', fontWeight: 600 }}>{ev.time}</td>
                <td style={{ padding: '9px 0 9px 8px', fontWeight: 700, color: C.orange, textAlign: 'right' }}>+{ev.pts}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      {/* Awards */}
      <Card>
        <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 12 }}>Awards & Stickers</div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
          {awards.map((a, i) => (
            <div key={i} style={{
              background: C.orangeLight, borderRadius: 12, padding: '10px 16px',
              fontSize: 14, fontWeight: 600, color: C.orange,
            }}>
              {a}
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ── LEADERBOARD PAGE ─────────────────────────────────────────────────────────
function LeaderboardPage({ runners }) {
  const [group, setGroup] = useState('All Groups');
  const isMobile = useIsMobile();
  const sorted = [...runners].sort((a, b) => b.points - a.points);
  const filtered = group === 'All Groups' ? sorted : sorted.filter(r => rGroups(r).includes(group));
  const groups = ['All Groups', ...new Set(runners.flatMap(r => rGroups(r)))];

  // Stable random medal counts per runner
  const medalData = React.useMemo(() =>
    Object.fromEntries(runners.map(r => [r.id, {
      golds:   Math.floor(Math.random() * 5),
      silvers: Math.floor(Math.random() * 5),
      bronzes: Math.floor(Math.random() * 5),
      events:  Math.floor(Math.random() * 15) + 5,
    }])), []);

  return (
    <div className="fade-in">
      <div style={{ marginBottom: isMobile ? 16 : 28 }}>
        <h1 style={{ fontSize: isMobile ? 22 : 26, fontWeight: 800 }}>Leaderboard</h1>
        <p style={{ color: C.muted, marginTop: 4 }}>{CURRENT_TERM} standings</p>
      </div>

      {/* Top 3 podium */}
      <div style={{ display: 'flex', gap: isMobile ? 8 : 16, marginBottom: isMobile ? 16 : 24 }}>
        {filtered.slice(0, 3).map((r, i) => {
          const medals = ['🥇','🥈','🥉'];
          const lc = levelColor(r.level);
          return (
            <Card key={r.id} style={{ flex: 1, textAlign: 'center', padding: isMobile ? '12px 8px' : 20 }}>
              <div style={{ fontSize: isMobile ? 28 : 36, marginBottom: 6 }}>{medals[i]}</div>
              <div style={{ fontWeight: 800, fontSize: isMobile ? 13 : 16, marginBottom: 4 }}>{r.name}</div>
              <div style={{
                background: lc.bg, color: lc.color, borderRadius: 999,
                padding: '2px 8px', fontSize: 11, fontWeight: 700, display: 'inline-block', marginBottom: 6,
              }}>L{r.level}</div>
              <div style={{ fontSize: isMobile ? 16 : 20, fontWeight: 800, color: C.orange }}>{r.points.toLocaleString()}</div>
              <div style={{ fontSize: 11, color: C.muted }}>pts</div>
            </Card>
          );
        })}
      </div>

      <Card>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16 }}>Full Standings</div>
          <select
            value={group}
            onChange={e => setGroup(e.target.value)}
            style={{
              padding: '8px 12px', borderRadius: 999, border: `1.5px solid ${C.border}`,
              fontSize: 13, fontFamily: 'Inter, sans-serif', background: C.white, cursor: 'pointer',
            }}
          >
            {groups.map(g => <option key={g}>{g}</option>)}
          </select>
        </div>

        {isMobile ? (
          /* Mobile: compact row cards */
          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            {filtered.map((r, i) => {
              const lc = levelColor(r.level);
              const m = medalData[r.id];
              return (
                <div key={r.id} style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  padding: '12px 4px',
                  borderBottom: `1px solid ${C.border}`,
                  background: i === 0 ? '#fffbeb' : 'transparent',
                }}>
                  {/* Rank */}
                  <div style={{ width: 24, textAlign: 'center', fontWeight: 700, color: i < 3 ? C.orange : C.muted, fontSize: 14, flexShrink: 0 }}>
                    {i + 1}
                  </div>
                  {/* Avatar initial */}
                  <div style={{
                    width: 36, height: 36, borderRadius: '50%', background: C.orangeLight,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontWeight: 800, fontSize: 14, color: C.orange, flexShrink: 0,
                  }}>{r.name.charAt(0)}</div>
                  {/* Name + group */}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.name}</div>
                    <div style={{ fontSize: 11, color: C.muted, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{rGroups(r).join(', ') || '—'}</div>
                  </div>
                  {/* Level badge */}
                  <span style={{
                    background: lc.bg, color: lc.color, borderRadius: 999,
                    padding: '2px 8px', fontSize: 11, fontWeight: 700, flexShrink: 0,
                  }}>L{r.level}</span>
                  {/* Points + streak */}
                  <div style={{ textAlign: 'right', flexShrink: 0 }}>
                    <div style={{ fontWeight: 800, color: C.orange, fontSize: 14 }}>{r.points.toLocaleString()}</div>
                    <div style={{ fontSize: 11, color: C.muted }}>{r.streak}🔥</div>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          /* Desktop: full table */
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
            <thead>
              <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                {['#', 'Runner', 'Level', 'Group', 'Points', 'Events', '🥇', '🥈', '🥉', 'Streak'].map(h => (
                  <th key={h} style={{ padding: '8px 10px', textAlign: 'left', fontWeight: 600, color: C.muted, fontSize: 12 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((r, i) => {
                const lc = levelColor(r.level);
                const m = medalData[r.id];
                return (
                  <tr key={r.id} style={{
                    borderBottom: `1px solid ${C.border}`,
                    background: i === 0 ? '#fffbeb' : 'transparent',
                  }}>
                    <td style={{ padding: '12px 10px', fontWeight: 700, color: i < 3 ? C.orange : C.muted }}>{i + 1}</td>
                    <td style={{ padding: '12px 10px', fontWeight: 600 }}>{r.name}</td>
                    <td style={{ padding: '12px 10px' }}>
                      <span style={{
                        background: lc.bg, color: lc.color, borderRadius: 999,
                        padding: '2px 8px', fontSize: 12, fontWeight: 700,
                      }}>L{r.level}</span>
                    </td>
                    <td style={{ padding: '12px 10px', color: C.muted, fontSize: 12 }}>{rGroups(r).join(', ') || '—'}</td>
                    <td style={{ padding: '12px 10px', fontWeight: 800, color: C.orange }}>{r.points.toLocaleString()}</td>
                    <td style={{ padding: '12px 10px', color: C.muted }}>{m.events}</td>
                    <td style={{ padding: '12px 10px' }}>{m.golds}</td>
                    <td style={{ padding: '12px 10px' }}>{m.silvers}</td>
                    <td style={{ padding: '12px 10px' }}>{m.bronzes}</td>
                    <td style={{ padding: '12px 10px', color: C.orange, fontWeight: 700 }}>{r.streak}🔥</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

// ── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [selectedRunner, setSelectedRunner] = useState(null);
  const [memberGroupFilter, setMemberGroupFilter] = useState(null);
  const [runners, setRunners] = useState(() => loadLS('cc_runners', RUNNERS));
  const [raceResult, setRaceResult] = useState(null);

  useEffect(() => { saveLS('cc_runners', runners); }, [runners]);

  function handleLogin(u) { setUser(u); setPage('dashboard'); }
  function handleLogout() { setUser(null); setPage('dashboard'); }
  function resetData() { setRunners(RUNNERS); localStorage.removeItem('cc_runners'); }

  if (!user) return <LoginPage onLogin={handleLogin} />;

  const role = user.role;

  if (page === 'runevent') {
    return (
      <div style={{ background: C.bg, minHeight: '100vh' }}>
        <RunEventPage setPage={setPage} runners={runners} setRunners={setRunners} setRaceResult={setRaceResult} />
      </div>
    );
  }
  if (page === 'results') {
    return (
      <div style={{ background: C.bg, minHeight: '100vh' }}>
        <ResultsPage setPage={setPage} runners={runners} setRunners={setRunners} raceResult={raceResult} />
      </div>
    );
  }

  function renderPage() {
    switch (page) {
      case 'dashboard':
        if (role === 'superadmin')  return <SuperAdminDashboard setPage={setPage} runners={runners} />;
        if (role === 'schooladmin') return <SchoolAdminDashboard setPage={setPage} runners={runners} />;
        if (role === 'lead')        return <LeadDashboard setPage={setPage} user={user} />;
        break;
      case 'organisations':
        return <OrganisationsPage setPage={setPage} />;
      case 'billing':
        return <BillingPage />;
      case 'groups':
        return <GroupsPage setPage={setPage} setMemberGroupFilter={setMemberGroupFilter} />;
      case 'members':
        return <MembersPage setPage={setPage} setSelectedRunner={setSelectedRunner} groupFilter={memberGroupFilter} setGroupFilter={setMemberGroupFilter} runners={runners} setRunners={setRunners} />;
      case 'events':
        return <EventsPage setPage={setPage} />;
      case 'createevent':
        return <CreateEventPage setPage={setPage} runners={runners} />;
      case 'leaderboard':
        return <LeaderboardPage runners={runners} />;
      case 'runnerprofile':
        return <RunnerProfilePage runner={selectedRunner} setPage={setPage} runners={runners} />;
      default:
        return <div style={{ padding: 40 }}>Page not found</div>;
    }
  }

  return (
    <AppLayout role={role} page={page} setPage={setPage} user={user} onLogout={handleLogout} onResetData={resetData}>
      {renderPage()}
    </AppLayout>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
