              <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                {['#', 'Runner', 'Level', 'Group', 'Points', 'Events', '🥇', '🥈', '🥉', 'Streak'].map(h => (
                  <th key={h} style={{ padding: '8px 10px', textAlign: 'left', fontWeight: 600, color: C.muted, fontSize: 12 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((r, i) => {
                const lc = levelColor(r.level);
                const m = medalData[r.id];
                return (
                  <tr key={r.id} className="tr-hover" style={{
                    borderBottom: `1px solid ${C.border}`,
                    background: i === 0 ? (_isDark ? 'rgba(251,191,36,0.10)' : '#fffbeb') : i === 1 ? C.bgSubtle : i === 2 ? (_isDark ? 'rgba(255,107,43,0.08)' : '#fdf6ee') : 'transparent',
                  }}>
                    <td style={{ padding: '12px 10px', fontWeight: 800, fontSize: 15 }}>
                      {i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : <span style={{ color: C.muted, fontWeight: 600, fontSize: 13 }}>{i + 1}</span>}
                    </td>
                    <td style={{ padding: '12px 10px', fontWeight: 600 }}>{r.name}</td>
                    <td style={{ padding: '12px 10px' }}>
                      <span style={{
                        background: lc.bg, color: lc.color, borderRadius: 999,
                        padding: '2px 8px', fontSize: 12, fontWeight: 700,
                      }}>L{r.level}</span>
                    </td>
                    <td style={{ padding: '12px 10px', color: C.muted, fontSize: 12 }}>{rGroups(r).join(', ') || '—'}</td>
                    <td style={{ padding: '12px 10px', fontWeight: 800, color: C.orange }}>{r.points.toLocaleString()}</td>
                    <td style={{ padding: '12px 10px', color: C.muted }}>{m.events}</td>
                    <td style={{ padding: '12px 10px' }}>{m.golds}</td>
                    <td style={{ padding: '12px 10px' }}>{m.silvers}</td>
                    <td style={{ padding: '12px 10px' }}>{m.bronzes}</td>
                    <td style={{ padding: '12px 10px', color: C.orange, fontWeight: 700 }}>{r.streak}🔥</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

// ── ROOT APP ─────────────────────────────────────────────────────────────────
// ── Toast ─────────────────────────────────────────────────────────────────────
let _showToast = null;
function toast(msg, type = 'success') { if (_showToast) _showToast(msg, type); }

function ToastContainer({ toasts }) {
  return (
    <div style={{ position: 'fixed', bottom: 88, right: 16, zIndex: 9000, display: 'flex', flexDirection: 'column', gap: 8, pointerEvents: 'none' }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          background: t.type === 'error' ? C.danger : '#1a1a1a',
          color: '#fff', borderRadius: 12, padding: '11px 16px',
          fontSize: 13, fontWeight: 600, fontFamily: 'Satoshi, sans-serif',
          boxShadow: '0 4px 20px rgba(0,0,0,0.22)',
          animation: 'slideInToast 0.22s ease-out',
          display: 'flex', alignItems: 'center', gap: 8, maxWidth: 280,
        }}>
          <span style={{ fontSize: 15 }}>{t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : 'ℹ'}</span>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [isDark, setIsDark] = useState(() => localStorage.getItem('cc_dark') === '1');

  // Keep module-level flag in sync — components re-render and pick up new C values via Proxy
  _isDark = isDark;

  useEffect(() => {
    localStorage.setItem('cc_dark', isDark ? '1' : '0');
    document.body.style.background = isDark ? DARK_C.bg : LIGHT_C.bg;
    document.body.style.color = isDark ? DARK_C.text : LIGHT_C.text;
    // Update scrollbar colours
    const id = 'cc-dark-scrollbar';
    let el = document.getElementById(id);
    if (!el) { el = document.createElement('style'); el.id = id; document.head.appendChild(el); }
    el.textContent = isDark
      ? '::-webkit-scrollbar-track{background:#1A1D24}::-webkit-scrollbar-thumb{background:#3D4455}::-webkit-scrollbar-thumb:hover{background:#FF6B2B}.tr-hover:hover{background:#1A1D24!important}'
      : '::-webkit-scrollbar-track{background:#FAF6F1}::-webkit-scrollbar-thumb{background:#C8B8A8}::-webkit-scrollbar-thumb:hover{background:#E8520A}.tr-hover:hover{background:#F5EFE8!important}';
  }, [isDark]);

  function toggleDark() { setIsDark(d => !d); }

  useEffect(() => {
    _showToast = (msg, type = 'success') => {
      const id = Date.now() + Math.random();
      setToasts(prev => [...prev, { id, msg, type }]);
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
    };
    return () => { _showToast = null; };
  }, []);
  const [page, setPage] = useState('dashboard');
  const [selectedRunner, setSelectedRunner] = useState(null);
  const [memberGroupFilter, setMemberGroupFilter] = useState(null);
  const [runners, setRunners] = useState(() => loadLS('cc_runners', RUNNERS));
  const [raceResult, setRaceResult] = useState(null);

  useEffect(() => { saveLS('cc_runners', runners); }, [runners]);

  function handleLogin(u) { setUser(u); setPage('dashboard'); }
  function handleLogout() { setUser(null); setPage('dashboard'); }
  function resetData() { setRunners(RUNNERS); localStorage.removeItem('cc_runners'); }

  if (!user) return <LoginPage onLogin={handleLogin} />;

  const role = user.role;

  if (page === 'runevent') {
    return (
      <div style={{ background: C.bg, minHeight: '100vh' }}>
        <RunEventPage setPage={setPage} runners={runners} setRunners={setRunners} setRaceResult={setRaceResult} />
      </div>
    );
  }
  if (page === 'results') {
    return (
      <div style={{ background: C.bg, minHeight: '100vh' }}>
        <ResultsPage setPage={setPage} runners={runners} setRunners={setRunners} raceResult={raceResult} />
      </div>
    );
  }

  function renderPage() {
    switch (page) {
      case 'dashboard':
        if (role === 'superadmin')  return <SuperAdminDashboard setPage={setPage} runners={runners} />;
        if (role === 'schooladmin') return <SchoolAdminDashboard setPage={setPage} runners={runners} setMemberGroupFilter={setMemberGroupFilter} />;
        if (role === 'lead')        return <LeadDashboard setPage={setPage} user={user} setSelectedRunner={setSelectedRunner} />;
        break;
      case 'organisations':
        return <OrganisationsPage setPage={setPage} />;
      case 'billing':
        return <BillingPage />;
      case 'groups':
        return <GroupsPage setPage={setPage} setMemberGroupFilter={setMemberGroupFilter} runners={runners} setRunners={setRunners} />;
      case 'members':
        return <MembersPage setPage={setPage} setSelectedRunner={setSelectedRunner} groupFilter={memberGroupFilter} setGroupFilter={setMemberGroupFilter} runners={runners} setRunners={setRunners} />;
      case 'events':
        return <EventsPage setPage={setPage} />;
      case 'createevent':
        return <CreateEventPage setPage={setPage} runners={runners} />;
      case 'leaderboard':
        return <LeaderboardPage runners={runners} />;
      case 'runnerprofile':
        return <RunnerProfilePage runner={selectedRunner} setPage={setPage} runners={runners} />;
      default:
        return <div style={{ padding: 40 }}>Page not found</div>;
    }
  }

  return (
    <>
      <AppLayout role={role} page={page} setPage={setPage} user={user} onLogout={handleLogout} onResetData={resetData} isDark={isDark} onToggleDark={toggleDark}>
        {renderPage()}
      </AppLayout>
      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
