<div id="gate" style="display:none; position:fixed; inset:0; background:#FAF6F1; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;">
  <div style="width:100%; max-width:380px;">

      <div style="font-size:24px; font-weight:800; color:#1a1a1a; font-family:'Inter',sans-serif;">Carrot Chase</div>
      <div style="font-size:14px; color:#6b7280; margin-top:6px; font-family:'Inter',sans-serif;">Enter the access code to continue</div>
    </div>
    <div style="background:#fff; border-radius:16px; padding:28px; box-shadow:0 2px 16px rgba(0,0,0,0.08);">
      <input id="gate-input" type="password" placeholder="Access code"
        style="width:100%; padding:14px 16px; border:2px solid #e5e7eb; border-radius:10px;
          font-size:16px; font-family:'Inter',sans-serif; outline:none; margin-bottom:12px;
          box-sizing:border-box; background:#fafafa; color:#1a1a1a;"
        onkeydown="if(event.key==='Enter') checkGate()" />
      <div id="gate-error" style="color:#dc2626; font-size:13px; font-family:'Inter',sans-serif;
        margin-bottom:10px; display:none; text-align:center;">Incorrect access code</div>
      <button onclick="checkGate()"
        style="width:100%; padding:14px; background:#D4520A; color:#fff; border:none;
          border-radius:10px; font-size:15px; font-weight:700; font-family:'Inter',sans-serif;
          cursor:pointer; transition:background 0.15s;">
        Continue →
      </button>
    </div>
  </div>
</div>

<div id="root" style="display:none;"></div>

<script>
  const HASH = 'b34563e2ebeb771708ba0648c9385383f61cc11e86af6076848433059c14b2df';

  async function checkGate() {
    const val = document.getElementById('gate-input').value;
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hex === HASH) {
      sessionStorage.setItem('cc_auth', '1');
      document.getElementById('gate').style.display = 'none';
      document.getElementById('root').style.display = '';
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('gate-input').style.borderColor = '#dc2626';
      document.getElementById('gate-input').value = '';
      setTimeout(() => {
        document.getElementById('gate-error').style.display = 'none';
        document.getElementById('gate-input').style.borderColor = '#e5e7eb';
      }, 2000);
    }
  }

  // On load: if already authed this session, skip gate
  if (sessionStorage.getItem('cc_auth') === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('root').style.display = '';
  } else {
    document.getElementById('gate').style.display = 'flex';
    setTimeout(() => document.getElementById('gate-input').focus(), 100);
  }
</script>

function loadLS(key, fallback) {

// ── Carrot Algorithm ─────────────────────────────────────────────────────────
// Target = second-fastest of last 5 event times (seconds)
function carrotTarget(runner) {
  if (!runner.times || runner.times.length < 2) return null;
  return [...runner.times].sort((a, b) => a - b)[1];
}

function fmtSecs(s) {
  if (s === null || s === undefined) return '—';
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2, '0')}`;
}

// ── Sound effects ────────────────────────────────────────────────────────────
const sfx = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }
  function tone(freq, dur, gain = 0.15, type = 'sine', t = 0) {
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(gain, c.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + t + dur);
      o.start(c.currentTime + t); o.stop(c.currentTime + t + dur);
    } catch(e) {}
  }
  return {
    // Soft tick when marking a runner present
    tick()   { tone(700, 0.055, 0.025); },
    // Satisfying thud when tapping a finisher
    tap()    { tone(160, 0.09, 0.09, 'sine'); tone(320, 0.06, 0.04, 'sine'); },
    // Gentle chime when assigning a runner to a position
    assign() { tone(880, 0.07, 0.03); tone(1100, 0.05, 0.018, 'sine', 0.06); },
    // Triumphant fanfare for Race Complete
    fanfare() {
      [[523,0.18,0.3,0.0],[659,0.18,0.3,0.14],[784,0.18,0.3,0.28],[1047,0.55,0.42,0.43],
       [784,0.18,0.28,0.55],[1047,0.7,0.45,0.72]].forEach(([f,d,g,t]) => tone(f,d,g,'sine',t));
      // Harmony layer
      tone(659, 0.7, 0.18, 'sine', 0.43);
      tone(523, 0.7, 0.13, 'sine', 0.43);
    },
    // Very soft tap for navigation / generic button press
    click()   { tone(600, 0.04, 0.018); },
    // Soft ascending two-note for positive confirmations (add, save, create)
    confirm() { tone(523, 0.07, 0.022); tone(784, 0.1, 0.028, 'sine', 0.08); },
    // Soft descending two-note for dismiss / cancel / back / sign out
    dismiss() { tone(440, 0.07, 0.02); tone(330, 0.09, 0.022, 'sine', 0.07); },
    // Gentle ascending three-note for successful login
    login()   { tone(523, 0.06, 0.02); tone(659, 0.06, 0.022, 'sine', 0.09); tone(784, 0.1, 0.028, 'sine', 0.18); },
  };
})();

// ── SVG Line Chart ───────────────────────────────────────────────────────────
function LineChart({ data, labels, title, height=200, color=C.orange }) {
  const W = 560, H = height;
  const pad = { top: 20, right: 20, bottom: 30, left: 50 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;
  const min = 0, max = Math.max(...data) * 1.1;
  const xs = data.map((_, i) => pad.left + (i / (data.length - 1)) * w);
  const ys = data.map(v => pad.top + h - ((v - min) / (max - min)) * h);
  const path = xs.map((x, i) => `${i === 0 ? 'M' : 'L'} ${x},${ys[i]}`).join(' ');
  const area = `${path} L ${xs[xs.length-1]},${pad.top+h} L ${xs[0]},${pad.top+h} Z`;
  const yTicks = [0, max*0.25, max*0.5, max*0.75, max].map(v => Math.round(v));

  return (
    <div>
      {title && <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 12 }}>{title}</div>}
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: H }} xmlns="http://www.w3.org/2000/svg">
        {yTicks.map((v, i) => {
          const y = pad.top + h - (v / (max || 1)) * h;
          return (
            <g key={i}>
              <line x1={pad.left} x2={W-pad.right} y1={y} y2={y} stroke="#e8e0d8" strokeWidth={1} />
              <text x={pad.left-6} y={y+4} textAnchor="end" fontSize={11} fill={C.muted}>
                {v >= 1000 ? `${(v/1000).toFixed(1)}k` : v}
              </text>
            </g>
          );
        })}
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.15" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        <path d={area} fill="url(#areaGrad)" />
        <path d={path} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round" />
        {xs.map((x, i) => (
          <circle key={i} cx={x} cy={ys[i]} r={3.5} fill={color} stroke={C.white} strokeWidth={2} />
        ))}
        {labels && labels.map((l, i) => (
          <text key={i} x={xs[i]} y={H-2} textAnchor="middle" fontSize={10} fill={C.muted}>{l}</text>
        ))}
      </svg>
    </div>
  );
}

function LoginPage({ onLogin }) {
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [error, setError]       = useState('');
  const [pendingUser, setPendingUser] = useState(null);
  const [twoFACode, setTwoFACode] = useState('');
  const [twoFAError, setTwoFAError] = useState('');
  const DEMO_CODE = '482716';
  const isMobile = useIsMobile();

  const CREDS = [
    { label: 'Super Admin',   email: 'super@demo.carrotchase.com',  password: 'demo1234', role: 'superadmin', name: 'Alex Morgan'    },
    { label: 'School Admin',  email: 'sarah@demo.carrotchase.com',  password: 'demo1234', role: 'schooladmin', name: 'Sarah Mitchell' },
    { label: 'Lead',          email: 'james@demo.carrotchase.com',  password: 'demo1234', role: 'lead',       name: 'James Carter'   },
  ];

  function handleLogin(e) {
    e.preventDefault();
    const match = CREDS.find(c => c.email === email && c.password === password);
    if (match) { sfx.click(); setPendingUser({ email: match.email, role: match.role, name: match.name }); }
    else { setError('Invalid credentials. Try the demo credentials below.'); }
  }

  function handleVerify(e) {
    e.preventDefault();
    if (twoFACode === DEMO_CODE) { sfx.login(); onLogin(pendingUser); }
    else { setTwoFAError('Incorrect code. Try the demo code shown above.'); }
  }

  // ── 2FA screen ──────────────────────────────────────────────────────────────
  if (pendingUser) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: C.bg, padding: 24 }}>
        <div style={{ width: '100%', maxWidth: 400, textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🔐</div>
          <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 8 }}>Two-factor authentication</h1>
          <p style={{ color: C.muted, marginBottom: 24 }}>We've sent a 6-digit code to <strong>{pendingUser.email}</strong></p>
          <div style={{ background: C.orangeLight, borderRadius: 12, padding: '12px 20px', marginBottom: 24, fontSize: 14, color: C.orange, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
            <span>Demo code: <strong style={{ fontSize: 20, letterSpacing: 4 }}>{DEMO_CODE}</strong></span>
            <button
              type="button"
              onClick={() => { setTwoFACode(DEMO_CODE); setTwoFAError(''); }}
              style={{
                background: C.orange, color: C.white, border: 'none', borderRadius: 8,
                padding: '6px 14px', fontSize: 13, fontWeight: 700, cursor: 'pointer',
                fontFamily: 'Inter, sans-serif', flexShrink: 0,
              }}
            >
              Fill ↓
            </button>
          </div>
          <form onSubmit={handleVerify}>
            <input
              value={twoFACode}
              onChange={e => { setTwoFACode(e.target.value); setTwoFAError(''); }}
              placeholder="Enter 6-digit code"
              maxLength={6}
              style={{
                width: '100%', padding: '14px', borderRadius: 12, border: `2px solid ${twoFAError ? C.danger : C.border}`,
                fontSize: 22, textAlign: 'center', letterSpacing: 6, fontFamily: 'Inter', marginBottom: 12,
                background: C.white, boxSizing: 'border-box',
              }}
            />
            {twoFAError && <div style={{ color: C.danger, fontSize: 13, marginBottom: 12 }}>{twoFAError}</div>}
            <Button style={{ width: '100%', justifyContent: 'center', marginBottom: 12 }}>Verify →</Button>
          </form>
          <button onClick={() => { setPendingUser(null); setTwoFACode(''); setTwoFAError(''); }}
            style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.muted, fontSize: 14, fontFamily: 'Inter' }}>
            ← Back to login
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', minHeight: '100vh' }}>

      <div style={{

        padding: isMobile ? '28px 20px' : 48,
        color: C.white,
      }}>
        <span style={{ fontSize: isMobile ? 40 : 72, marginBottom: isMobile ? 10 : 24 }}>🥕</span>
        <h1 style={{ fontSize: isMobile ? 26 : 40, fontWeight: 800, marginBottom: 8, textAlign: 'center' }}>Carrot Chase</h1>
        <p style={{ fontSize: isMobile ? 14 : 20, fontWeight: 400, marginBottom: isMobile ? 16 : 48, opacity: 0.9, textAlign: 'center' }}>
          Pursuit racing for every runner
        </p>
        <div style={{ display: 'flex', flexDirection: isMobile ? 'row' : 'column', flexWrap: 'wrap', gap: isMobile ? 8 : 14, width: '100%', maxWidth: 360, justifyContent: 'center' }}>
          {[
            '400% more participation',
            '£1,000 avg school return',
            '99 levels of competition',
          ].map(stat => (
            <div key={stat} style={{
              border: '2px solid rgba(255,255,255,0.6)', borderRadius: 999,
              padding: isMobile ? '6px 12px' : '12px 24px',
              fontSize: isMobile ? 11 : 15, fontWeight: 600, textAlign: 'center',
              backdropFilter: 'blur(4px)', background: 'rgba(255,255,255,0.08)',

              {stat}

                  fontFamily: 'Inter, sans-serif', background: C.white, outline: 'none',
                }}
              />
            </div>
            {error && (
              <div style={{
                background: C.dangerLight, color: C.danger, borderRadius: 10,
                padding: '10px 14px', fontSize: 13, marginBottom: 16,
              }}>
                {error}
              </div>

            <Button size="lg" style={{ width: '100%', justifyContent: 'center', marginBottom: 24 }}>
              Sign in
            </Button>
          </form>

          {/* Demo credentials */}
          <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.muted, marginBottom: 10 }}>

            <div style={{ display: 'flex', gap: 8 }}>

                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

    );

  return (
    <div style={{
      width: size, height: size, borderRadius: 10, flexShrink: 0,
      background: color + '22', border: `1.5px solid ${color}44`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',

    }}>
      {org.logo || org.name[0]}

}

function OrganisationsPage({ setPage }) {
  const isMobile = useIsMobile();
  const [tab, setTab] = React.useState('orgs'); // 'orgs' | 'invites'
  const [orgs, setOrgs] = React.useState(ORGS);
  const [invites, setInvites] = React.useState(SEED_INVITES);
  const [viewOrg, setViewOrg] = React.useState(null);
  const [showNewModal, setShowNewModal] = React.useState(false);
  const [showInviteModal, setShowInviteModal] = React.useState(false);
  const [newForm, setNewForm] = React.useState({ name: '', type: 'School', location: '', admin: '' });
  const [inviteForm, setInviteForm] = React.useState({ email: '', name: '', org: '' });
  const [inviteSent, setInviteSent] = React.useState(false);

  const inputStyle = {
    width: '100%', padding: '10px 14px', borderRadius: 12,
    border: `1.5px solid ${C.border}`, fontSize: 14,
    fontFamily: 'Inter, sans-serif', background: C.white,
    boxSizing: 'border-box',
  };

  function handleAddOrg() {
    if (!newForm.name.trim()) return;
    const next = {
      id: `org-${Date.now()}`,
      name: newForm.name.trim(),
      type: newForm.type,
      location: newForm.location.trim() || '—',
      admin: newForm.admin.trim() || '—',
      runners: 0,
      events: 0,
      status: 'active',
    };
    sfx.confirm();
    setOrgs([...orgs, next]);
    setNewForm({ name: '', type: 'School', location: '', admin: '' });
    setShowNewModal(false);
  }

  function handleSendInvite() {
    if (!inviteForm.email.trim()) return;
    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const next = {
      id: `inv-${Date.now()}`,
      email: inviteForm.email.trim(),
      name: inviteForm.name.trim(),
      org: inviteForm.org.trim() || '—',
      sentAt: today,
      status: 'sent',
    };
    setInvites(prev => [next, ...prev]);
    setInviteSent(true);
    setTimeout(() => {
      setInviteSent(false);
      setInviteForm({ email: '', name: '', org: '' });
      setShowInviteModal(false);
      setTab('invites');
    }, 1600);
  }

  function handleResend(id) {
    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    setInvites(prev => prev.map(inv => inv.id === id ? { ...inv, status: 'sent', sentAt: today } : inv));
  }

  function handleRevoke(id) {
    setInvites(prev => prev.filter(inv => inv.id !== id));
  }

  function inviteStatusBadge(status) {
    if (status === 'accepted') return { label: 'Accepted', bg: C.successLight, color: C.success };
    if (status === 'expired')  return { label: 'Expired',  bg: C.dangerLight,  color: C.danger  };
    return { label: 'Sent', bg: '#EFF6FF', color: '#2563EB' };
  }

  // ── Org detail panel ──────────────────────────────────────────────────────
  if (viewOrg) {
    const s = statusBadge(viewOrg.status);
    return (
      <div className="fade-in">
        <button
          onClick={() => setViewOrg(null)}
          style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.muted, fontSize: 14, fontFamily: 'Inter', marginBottom: 16 }}
        >
          ← Back to Organisations
        </button>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 24 }}>
          <OrgLogo org={viewOrg} size={56} />
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
              <h1 style={{ fontSize: isMobile ? 20 : 24, fontWeight: 800 }}>{viewOrg.name}</h1>
              <Badge label={s.label} bg={s.bg} color={s.color} />
            </div>
            <p style={{ color: C.muted, margin: 0 }}>{viewOrg.type} · {viewOrg.location}</p>
          </div>
        </div>
        <div style={{
          display: 'grid',
          gridTemplateColumns: isMobile ? '1fr 1fr' : 'repeat(4, 1fr)',
          gap: isMobile ? 10 : 16,
          marginBottom: 24,
        }}>
          <StatCard label="Runners" value={viewOrg.runners} sub="Registered" color={C.orange} />
          <StatCard label="Events" value={viewOrg.events} sub="All time" />
          <StatCard label="Plan" value="Pro" sub="Active licence" color={C.success} />
          <StatCard label="Admin" value={viewOrg.admin.split(' ')[0]} sub={viewOrg.admin} />
        </div>
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 16 }}>Organisation Details</div>
          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 16 }}>
            {[
              ['Name', viewOrg.name],
              ['Type', viewOrg.type],
              ['Location', viewOrg.location],
              ['Admin Contact', viewOrg.admin],
              ['Status', s.label],
            ].map(([label, val]) => (
              <div key={label}>
                <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, marginBottom: 4 }}>{label}</div>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{val}</div>
              </div>
            ))}
          </div>
        </Card>
        {/* Groups */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 14 }}>Groups</div>
          {GROUPS.map(g => (
            <div key={g.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: `1px solid ${C.border}`, fontSize: 14 }}>
              <div>
                <span style={{ fontWeight: 600 }}>{g.name}</span>
                <span style={{ color: C.muted, fontSize: 12, marginLeft: 8 }}>{g.type}</span>
              </div>
              <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                {g.lead && <span style={{ fontSize: 12, color: C.muted }}>Lead: {g.lead}</span>}
                <Badge label={`${g.members} runners`} bg={C.orangeLight} color={C.orange} />
              </div>
            </div>
          ))}
        </Card>

        {/* Recent events */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 14 }}>Recent Events</div>
          {EVENTS.filter(e => e.status === 'completed').slice(0, 4).map(ev => (
            <div key={ev.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: `1px solid ${C.border}`, fontSize: 14 }}>
              <div>
                <div style={{ fontWeight: 600 }}>{ev.name}</div>
                <div style={{ fontSize: 12, color: C.muted }}>{ev.date} · {ev.group}</div>
              </div>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <Badge label={ev.format} bg={C.orangeLight} color={C.orange} />
                <span style={{ fontSize: 12, color: C.muted }}>{ev.runners} finishers</span>
              </div>
            </div>
          ))}
          {EVENTS.filter(e => e.status === 'completed').length === 0 && (
            <div style={{ color: C.muted, fontSize: 13 }}>No completed events yet.</div>
          )}
        </Card>

        <div style={{ display: 'flex', gap: 10 }}>
          <Button variant="secondary" onClick={() => setViewOrg(null)}>Close</Button>
        </div>
      </div>
    );
  }

  // ── Main list ─────────────────────────────────────────────────────────────
  return (
    <div className="fade-in">
      {/* Add Organisation modal */}
      {showNewModal && (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 500,
          background: 'rgba(0,0,0,0.35)', display: 'flex',
          alignItems: 'center', justifyContent: 'center', padding: 16,
        }}>
          <div style={{
            background: C.white, borderRadius: 20, padding: 28,
            width: '100%', maxWidth: 420, boxShadow: '0 8px 40px rgba(0,0,0,0.18)',
          }}>
            <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 20 }}>New Organisation</div>
            {[
              { label: 'Name', key: 'name', placeholder: 'e.g. Riverside Academy' },
              { label: 'Location', key: 'location', placeholder: 'e.g. London' },
              { label: 'Admin Contact', key: 'admin', placeholder: 'e.g. Jane Smith' },
            ].map(f => (
              <div key={f.key} style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>{f.label}</label>
                <input
                  value={newForm[f.key]}
                  onChange={e => setNewForm({ ...newForm, [f.key]: e.target.value })}
                  placeholder={f.placeholder}
                  autoCapitalize="words"
                  style={inputStyle}
                />
              </div>
            ))}
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Type</label>
              <select
                value={newForm.type}
                onChange={e => setNewForm({ ...newForm, type: e.target.value })}
                style={inputStyle}
              >
                {['School', 'Academy', 'Running Club', 'Business'].map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <Button style={{ flex: 1 }} onClick={handleAddOrg}>Add Organisation</Button>
              <Button variant="secondary" style={{ flex: 1 }} onClick={() => setShowNewModal(false)}>Cancel</Button>
            </div>
          </div>
        </div>
      )}

      {/* Invite modal */}
      {showInviteModal && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
          <div style={{ background: C.white, borderRadius: 20, padding: 28, width: '100%', maxWidth: 420, boxShadow: '0 8px 40px rgba(0,0,0,0.18)' }}>
            {inviteSent ? (
              <div style={{ textAlign: 'center', padding: '20px 0' }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>✉️</div>
                <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 6 }}>Invitation sent!</div>
                <div style={{ fontSize: 14, color: C.muted }}>A setup link has been sent to {inviteForm.email}. It expires in 72 hours.</div>
              </div>
            ) : (
              <>
                <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 4 }}>Invite School Admin</div>
                <div style={{ fontSize: 13, color: C.muted, marginBottom: 20 }}>They'll receive an email with a setup link (expires in 72 hours).</div>
                {[
                  { label: 'Email address *', key: 'email', placeholder: 'admin@school.co.uk', type: 'email', cap: 'none' },
                  { label: 'Name (optional)', key: 'name',  placeholder: 'e.g. Jane Smith', type: 'text', cap: 'words' },
                  { label: 'Organisation (optional)', key: 'org', placeholder: 'e.g. Riverside Academy', type: 'text', cap: 'words' },
                ].map(f => (
                  <div key={f.key} style={{ marginBottom: 14 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>{f.label}</label>
                    <input
                      type={f.type}
                      value={inviteForm[f.key]}
                      onChange={e => setInviteForm(prev => ({ ...prev, [f.key]: e.target.value }))}
                      placeholder={f.placeholder}
                      autoCapitalize={f.cap}
                      style={inputStyle}
                    />
                  </div>
                ))}
                <div style={{ display: 'flex', gap: 10, marginTop: 8 }}>
                  <Button style={{ flex: 1 }} disabled={!inviteForm.email.trim()} onClick={handleSendInvite}>Send Invite</Button>
                  <Button variant="secondary" style={{ flex: 1 }} onClick={() => { setShowInviteModal(false); setInviteForm({ email: '', name: '', org: '' }); }}>Cancel</Button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Page header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: isMobile ? 16 : 24 }}>
        <div>
          <h1 style={{ fontSize: isMobile ? 22 : 26, fontWeight: 800 }}>Organisations</h1>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <Button variant="outline" size="sm" onClick={() => setShowInviteModal(true)}>{isMobile ? '✉️ Invite' : '✉️ Invite Admin'}</Button>
          {tab === 'orgs' && <Button size="sm" onClick={() => setShowNewModal(true)}>+ Add</Button>}
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 20, borderBottom: `1px solid ${C.border}`, paddingBottom: 0 }}>
        {[
          { id: 'orgs',    label: `Organisations (${orgs.length})` },
          { id: 'invites', label: `Invitations (${invites.filter(i => i.status === 'sent').length} pending)` },
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding: '8px 16px', background: 'none', border: 'none', cursor: 'pointer',
            fontFamily: 'Inter, sans-serif', fontSize: 14, fontWeight: tab === t.id ? 700 : 500,
            color: tab === t.id ? C.orange : C.muted,
            borderBottom: `2px solid ${tab === t.id ? C.orange : 'transparent'}`,
            marginBottom: -1,
          }}>{t.label}</button>
        ))}
      </div>

      {/* Organisations tab */}
      {tab === 'orgs' && (
        <Card style={{ padding: isMobile ? 12 : 24 }}>
          <OrgTable orgs={orgs} isMobile={isMobile} onView={setViewOrg} />
        </Card>
      )}

      {/* Invitations tab */}
      {tab === 'invites' && (
        <Card>
          {invites.length === 0 && (
            <div style={{ textAlign: 'center', padding: '40px 0', color: C.muted }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>✉️</div>
              <div style={{ fontWeight: 600 }}>No invitations yet</div>
              <div style={{ fontSize: 13, marginTop: 4 }}>Use "Invite Admin" to onboard a new school.</div>
            </div>
          )}
          {invites.map(inv => {
            const s = inviteStatusBadge(inv.status);
            return (
              <div key={inv.id} style={{
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '14px 0', borderBottom: `1px solid ${C.border}`,
                flexWrap: isMobile ? 'wrap' : 'nowrap',
              }}>
                {/* Avatar initial */}
                <div style={{
                  width: 38, height: 38, borderRadius: '50%', background: C.orangeLight,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 15, fontWeight: 700, color: C.orange, flexShrink: 0,
                }}>
                  {(inv.name || inv.email)[0].toUpperCase()}
                </div>
                {/* Details */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 1 }}>
                    {inv.name || <span style={{ color: C.muted, fontStyle: 'italic' }}>Name not provided</span>}
                  </div>
                  <div style={{ fontSize: 12, color: C.muted, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {inv.email}{inv.org && inv.org !== '—' ? ` · ${inv.org}` : ''}
                  </div>
                </div>
                {/* Sent date */}
                <div style={{ fontSize: 12, color: C.muted, flexShrink: 0, display: isMobile ? 'none' : 'block' }}>
                  Sent {inv.sentAt}
                </div>
                {/* Status badge */}
                <Badge label={s.label} bg={s.bg} color={s.color} />
                {/* Actions */}
                <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                  {inv.status !== 'accepted' && (
                    <button onClick={() => handleResend(inv.id)} style={{
                      background: 'none', border: `1px solid ${C.border}`, borderRadius: 8,
                      padding: '4px 10px', fontSize: 12, cursor: 'pointer', color: C.text,
                      fontFamily: 'Inter, sans-serif', fontWeight: 500,
                    }}>Resend</button>
                  )}
                  {inv.status !== 'accepted' && (
                    <button onClick={() => handleRevoke(inv.id)} style={{
                      background: 'none', border: `1px solid ${C.border}`, borderRadius: 8,
                      padding: '4px 10px', fontSize: 12, cursor: 'pointer', color: C.danger,
                      fontFamily: 'Inter, sans-serif', fontWeight: 500,
                    }}>Revoke</button>
                  )}
                </div>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

  const GROUP_TYPES = ['Running Club', 'Breakfast Club', 'PE Class', 'After-School Club', 'Cross Country'];

  function handleSendLeadInvite() {
    if (!inviteForm.email.trim()) return;
    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    setLeadInvites(prev => [{ id: `li-${Date.now()}`, email: inviteForm.email.trim(), name: inviteForm.name.trim(), groups: inviteForm.groups, sentAt: today, status: 'sent' }, ...prev]);

    setTimeout(() => { setInviteSent(false); setInviteForm({ email: '', name: '', groups: [] }); setShowInviteModal(false); }, 1600);

    if (status === 'expired')  return { label: 'Expired',  bg: C.dangerLight,  color: C.danger  };

              value={newForm.type}
              onChange={e => setNewForm(f => ({ ...f, type: e.target.value }))}
              style={{ width: '100%', padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Inter', background: C.white }}
            >
              {GROUP_TYPES.map(t => <option key={t}>{t}</option>)}
            </select>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Lead (optional)</label>
            <select value={newForm.lead} onChange={e => setNewForm(f => ({ ...f, lead: e.target.value }))}
              style={{ width: '100%', padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Inter', background: C.white }}>
              <option value="">— Unassigned —</option>
              {leadInvites.filter(i => i.status === 'accepted').map(i => (
                <option key={i.id} value={i.name || i.email}>{i.name || i.email}{i.groups?.length > 0 ? ` (${i.groups.join(', ')})` : ''}</option>
              ))}
            </select>
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
            <Button variant="secondary" onClick={() => setShowNewModal(false)}>Cancel</Button>
            <Button
              disabled={!newForm.name.trim()}
              onClick={() => {
                if (!newForm.name.trim()) return;
                setGroups(gs => [...gs, {
                  id: Date.now(), name: newForm.name.trim(), type: newForm.type,
                  lead: newForm.lead || '', members: 0, lastEvent: '—', nextEvent: '—',
                }]);
                setShowNewModal(false);
                setNewForm({ name: '', type: 'Running Club', lead: '' });
              }}
            >
              Create Group
            </Button>
          </div>
        </Modal>
      )}

      {/* Edit Group Modal */}
      {editGroup && (
        <Modal title="Edit Group" onClose={() => setEditGroup(null)}>
          <Field label="Group name" value={editGroup.name} onChange={v => setEditGroup(g => ({ ...g, name: v }))} placeholder="Group name" capitalize="words" />
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Type</label>
            <select
              value={editGroup.type || 'Running Club'}
              onChange={e => setEditGroup(g => ({ ...g, type: e.target.value }))}
              style={{ width: '100%', padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Inter', background: C.white }}
            >
              {GROUP_TYPES.map(t => <option key={t}>{t}</option>)}
            </select>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Lead</label>
            <select value={editGroup.lead || ''} onChange={e => setEditGroup(g => ({ ...g, lead: e.target.value }))}
              style={{ width: '100%', padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Inter', background: C.white }}>
              <option value="">— Unassigned —</option>
              {leadInvites.filter(i => i.status === 'accepted').map(i => (
                <option key={i.id} value={i.name || i.email}>{i.name || i.email}</option>
              ))}
            </select>
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'space-between', marginTop: 8 }}>
            <Button variant="danger" onClick={() => {
              if (!window.confirm(`Archive "${editGroup.name}"? The group will be hidden but its event history is preserved.`)) return;
              setGroups(gs => gs.map(g => g.id === editGroup.id ? { ...g, archived: true } : g));
              setEditGroup(null);
            }}>
              Archive
            </Button>
            <div style={{ display: 'flex', gap: 10 }}>
              <Button variant="secondary" onClick={() => setEditGroup(null)}>Cancel</Button>
              <Button
                disabled={!editGroup.name.trim()}
                onClick={() => {
                  setGroups(gs => gs.map(g => g.id === editGroup.id ? { ...g, name: editGroup.name, type: editGroup.type, lead: editGroup.lead || '' } : g));
                  setEditGroup(null);
                }}
              >
                Save Changes
              </Button>
            </div>
          </div>
        </Modal>
      )}

      {/* Archived groups */}
      {groups.some(g => g.archived) && (
        <div style={{ marginTop: 24 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: C.muted, marginBottom: 10 }}>Archived Groups</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {groups.filter(g => g.archived).map(g => (
              <div key={g.id} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '10px 16px', borderRadius: 10, background: C.bg, border: `1px solid ${C.border}`, opacity: 0.7,
              }}>
                <div>
                  <span style={{ fontWeight: 600, fontSize: 14, color: C.muted }}>{g.name}</span>
                  <span style={{ fontSize: 12, color: C.muted, marginLeft: 10 }}>{g.type}</span>
                </div>
                <button onClick={() => setGroups(gs => gs.map(x => x.id === g.id ? { ...x, archived: false } : x))}
                  style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8, padding: '4px 12px', fontSize: 12, cursor: 'pointer', fontFamily: 'Inter', color: C.text }}>
                  Restore
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Leads section */}
      <div style={{ marginTop: isMobile ? 28 : 36 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16 }}>Leads</div>
          <span style={{ fontSize: 12, color: C.muted }}>{leadInvites.filter(i => i.status === 'sent').length} pending invite{leadInvites.filter(i => i.status === 'sent').length !== 1 ? 's' : ''}</span>
        </div>
        <Card style={{ padding: 0 }}>
          {leadInvites.length === 0 && (
            <div style={{ padding: '32px 0', textAlign: 'center', color: C.muted }}>
              <div style={{ fontSize: 13 }}>No leads invited yet. Use "Invite Lead" to get started.</div>
            </div>
          )}
          {leadInvites.map(inv => {
            const s = inviteStatusBadge(inv.status);
            return (
              <div key={inv.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 20px', borderBottom: `1px solid ${C.border}`, flexWrap: isMobile ? 'wrap' : 'nowrap' }}>
                <div style={{ width: 36, height: 36, borderRadius: '50%', background: C.orangeLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 700, color: C.orange, flexShrink: 0 }}>
                  {(inv.name || inv.email)[0].toUpperCase()}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{inv.name || <span style={{ color: C.muted, fontStyle: 'italic' }}>Name not provided</span>}</div>
                  <div style={{ fontSize: 12, color: C.muted, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {inv.email}{(inv.groups?.length > 0 || inv.group) ? ` · ${inv.groups?.join(', ') || inv.group}` : ''}
                  </div>
                </div>
                <Badge label={s.label} bg={s.bg} color={s.color} />
                {inv.status !== 'accepted' && (
                  <button onClick={() => {
                    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                    setLeadInvites(prev => prev.map(i => i.id === inv.id ? { ...i, status: 'sent', sentAt: today } : i));
                  }} style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8, padding: '4px 10px', fontSize: 12, cursor: 'pointer', color: C.text, fontFamily: 'Inter', flexShrink: 0 }}>Resend</button>
                )}
                {inv.status !== 'accepted' && (
                  <button onClick={() => setLeadInvites(prev => prev.filter(i => i.id !== inv.id))} style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8, padding: '4px 10px', fontSize: 12, cursor: 'pointer', color: C.danger, fontFamily: 'Inter', flexShrink: 0 }}>Revoke</button>
                )}
              </div>
            );
          })}
        </Card>
      </div>
    </div>
  );
}

// ── MEMBERS PAGE ─────────────────────────────────────────────────────────────
function MembersPage({ setPage, setSelectedRunner, groupFilter, setGroupFilter, runners, setRunners }) {
  const [search, setSearch] = useState('');
  const [showAddModal, setShowAddModal] = useState(false);
  const [showCSVModal, setShowCSVModal] = useState(false);
  const [csvPreview, setCsvPreview] = useState(null);
  const [addForm, setAddForm] = useState({ firstName: '', lastName: '', year: 'Year 5', group: 'Year 5 Running Club' });
  const [editRunner, setEditRunner] = useState(null);
  const [editForm, setEditForm] = useState({ name: '', group: '' });
  const csvRef = useRef(null);
  const isMobile = useIsMobile();

  function openEdit(r, e) {
    e.stopPropagation();
    setEditForm({ name: r.name, group: rGroups(r)[0] || '' });
    setEditRunner(r);
  }

  function handleEditSave() {
    if (!editForm.name.trim()) return;
    setRunners(runners.map(r => r.id === editRunner.id
      ? { ...r, name: editForm.name.trim(), groups: editForm.group ? [editForm.group] : [] }
      : r
    ));
    setEditRunner(null);
  }

  const filtered = runners.filter(r => {
    const matchesSearch =
      r.name.toLowerCase().includes(search.toLowerCase()) ||
      r.id.toLowerCase().includes(search.toLowerCase()) ||
      rGroups(r).some(g => g.toLowerCase().includes(search.toLowerCase()));
    const matchesGroup = groupFilter ? rGroups(r).includes(groupFilter) : true;
    return matchesSearch && matchesGroup;
  });

  const inputStyle = { width: '100%', padding: '10px 14px', borderRadius: 12, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: 'Inter', background: C.white, boxSizing: 'border-box' };

  function handleAddRunner() {
    if (!addForm.firstName.trim()) return;
    const name = `${addForm.firstName.trim()} ${addForm.lastName.trim()}`.trim();
    const nextNum = runners.length + 1;
    const id = `CC-${String(nextNum).padStart(4, '0')}`;
    const newRunner = { id, name, level: 99, pb: '—', groups: addForm.group ? [addForm.group] : [], streak: 0, points: 0, times: [420,420,420,420,420], badges: [] };
    sfx.confirm();
    setRunners([...runners, newRunner]);
    setAddForm({ firstName: '', lastName: '', year: 'Year 5', group: 'Year 5 Running Club' });
    setShowAddModal(false);
  }

  function downloadCSVTemplate() {
    const template = 'name,group,year\nEmma Johnson,Year 5 Running Club,Year 5\nOliver Smith,Year 6 Running Club,Year 6';
    const blob = new Blob([template], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'carrot-chase-runners-template.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function handleCSVFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length < 2) return;
      const headers = lines[0].toLowerCase().split(',').map(h => h.trim());
      const nameIdx = headers.indexOf('name');
      const groupIdx = headers.indexOf('group');
      const yearIdx = headers.indexOf('year');
      const parsed = lines.slice(1).map((line, rowIdx) => {
        const cols = line.split(',').map(c => c.trim());
        const name = nameIdx >= 0 ? cols[nameIdx] : cols[0] || '';
        const group = groupIdx >= 0 ? cols[groupIdx] : (cols[1] || 'Year 5 Running Club');
        const year = yearIdx >= 0 ? cols[yearIdx] : '';
        const errors = [];
        if (!name) errors.push('Missing name');
        if (!group) errors.push('Missing group');
        return { name: name || '—', group, year, row: rowIdx + 2, errors };
      });
      setCsvPreview(parsed);
      setShowCSVModal(true);
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function confirmCSVImport() {
    const validRows = csvPreview.filter(r => r.errors.length === 0);
    const newRunners = validRows.map((r, i) => ({
      id: `CC-${String(runners.length + i + 1).padStart(4, '0')}`,
      name: r.name, level: 99, pb: '—', groups: r.group ? [r.group] : [], streak: 0, points: 0, times: [420,420,420,420,420], badges: [],
    }));
    sfx.confirm();
    setRunners([...runners, ...newRunners]);
    setShowCSVModal(false); setCsvPreview(null);
  }

  return (
    <div className="fade-in">
      {/* Hidden CSV file input */}
      <input ref={csvRef} type="file" accept=".csv" onChange={handleCSVFile} style={{ display: 'none' }} />

      {/* Add Runner Modal */}
      {showAddModal && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '64px 16px 16px', overflowY: 'auto' }}>
          <div style={{ background: C.white, borderRadius: 20, padding: 28, width: '100%', maxWidth: 400, boxShadow: '0 8px 40px rgba(0,0,0,0.18)' }}>
            <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 20 }}>Add Runner</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>First name</label>
                <input value={addForm.firstName} onChange={e => setAddForm(f => ({ ...f, firstName: e.target.value }))} placeholder="e.g. Emma" autoCapitalize="words" style={inputStyle} />
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Last name</label>
                <input value={addForm.lastName} onChange={e => setAddForm(f => ({ ...f, lastName: e.target.value }))} placeholder="e.g. Johnson" autoCapitalize="words" style={inputStyle} />
              </div>
            </div>
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Year group</label>
              <select value={addForm.year} onChange={e => setAddForm(f => ({ ...f, year: e.target.value }))} style={inputStyle}>
                {['Year 3','Year 4','Year 5','Year 6','Other'].map(y => <option key={y}>{y}</option>)}
              </select>
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 6, color: C.muted }}>Group</label>
              <select value={addForm.group} onChange={e => setAddForm(f => ({ ...f, group: e.target.value }))} style={inputStyle}>
                {['Year 5 Running Club','Year 6 Running Club','Breakfast Club','PE Class 4B'].map(g => <option key={g}>{g}</option>)}
              </select>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <Button style={{ flex: 1 }} disabled={!addForm.firstName.trim()} onClick={handleAddRunner}>Add Runner</Button>
              <Button variant="secondary" style={{ flex: 1 }} onClick={() => setShowAddModal(false)}>Cancel</Button>
            </div>
          </div>
        </div>
      )}

      {/* CSV Preview Modal */}
      {showCSVModal && csvPreview && (() => {
        const validRows = csvPreview.filter(r => r.errors.length === 0);
        const errorRows = csvPreview.filter(r => r.errors.length > 0);
        return (
          <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
            <div style={{ background: C.white, borderRadius: 20, padding: 28, width: '100%', maxWidth: 440, boxShadow: '0 8px 40px rgba(0,0,0,0.18)', maxHeight: '80vh', overflowY: 'auto' }}>
              <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 6 }}>CSV Preview</div>
              <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
                <span style={{ background: C.successLight, color: C.success, borderRadius: 999, padding: '3px 10px', fontSize: 12, fontWeight: 700 }}>
                  ✓ {validRows.length} valid
                </span>
                {errorRows.length > 0 && (
                  <span style={{ background: C.dangerLight, color: C.danger, borderRadius: 999, padding: '3px 10px', fontSize: 12, fontWeight: 700 }}>
                    ✕ {errorRows.length} error{errorRows.length !== 1 ? 's' : ''} — will be skipped
                  </span>
                )}
              </div>
              {csvPreview.slice(0, 12).map((r, i) => {
                const hasError = r.errors.length > 0;
                return (
                  <div key={i} style={{
                    padding: '8px 10px', borderRadius: 8, marginBottom: 4, fontSize: 13,
                    background: hasError ? C.dangerLight : C.bg,
                    border: `1px solid ${hasError ? '#fca5a5' : C.border}`,
                  }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <span style={{ fontWeight: 600, color: hasError ? C.danger : C.text }}>
                        {hasError ? '✕' : '✓'} {r.name !== '—' ? r.name : '(no name)'}
                      </span>
                      <span style={{ color: C.muted, fontSize: 12 }}>{r.group}</span>
                    </div>
                    {hasError && <div style={{ fontSize: 11, color: C.danger, marginTop: 2 }}>Row {r.row}: {r.errors.join(', ')}</div>}
                  </div>
                );
              })}
              {csvPreview.length > 12 && <div style={{ fontSize: 12, color: C.muted, padding: '6px 0' }}>…and {csvPreview.length - 12} more rows</div>}
              <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
                <Button style={{ flex: 1 }} disabled={validRows.length === 0} onClick={confirmCSVImport}>
                  Import {validRows.length} Runner{validRows.length !== 1 ? 's' : ''}
                </Button>
                <Button variant="secondary" style={{ flex: 1 }} onClick={() => { setShowCSVModal(false); setCsvPreview(null); }}>Cancel</Button>
              </div>
            </div>
          </div>
        );
      })()}

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: isMobile ? 22 : 26, fontWeight: 800 }}>
            {groupFilter ? groupFilter : 'Members'}
          </h1>
          <p style={{ color: C.muted, marginTop: 4 }}>
            {filtered.length} runner{filtered.length !== 1 ? 's' : ''}{groupFilter ? ` · ` : ` registered`}
            {groupFilter && (
              <button onClick={() => setGroupFilter(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.orange, fontFamily: 'Inter', fontSize: 13, padding: 0 }}>
                Clear filter
              </button>
            )}
          </p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {!isMobile && <Button variant="ghost" size="sm" onClick={downloadCSVTemplate}>⬇ Template</Button>}
          <Button variant="secondary" size={isMobile ? 'sm' : 'md'} onClick={() => csvRef.current?.click()}>⬆ CSV</Button>
          <Button size={isMobile ? 'sm' : 'md'} onClick={() => setShowAddModal(true)}>+ Add</Button>
        </div>
      </div>

      <Card style={{ padding: isMobile ? 12 : 24 }}>
        <div style={{ marginBottom: 16, position: 'relative' }}>
          <input
            type="text"
            placeholder="Search by name, ID, or group..."
            autoCapitalize="none"
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{
              width: '100%', padding: '10px 36px 10px 14px', borderRadius: 12,
              border: `1.5px solid ${C.border}`, fontSize: 14,
              fontFamily: 'Inter, sans-serif', background: C.bg, outline: 'none',
              boxSizing: 'border-box',
            }}
          />
          {search && (
            <button
              onClick={() => setSearch('')}
              style={{
                position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)',
                background: C.muted, color: '#fff', border: 'none', borderRadius: '50%',
                width: 20, height: 20, cursor: 'pointer', fontSize: 12, lineHeight: '20px',
                textAlign: 'center', padding: 0, fontFamily: 'Inter, sans-serif',
              }}
            >✕</button>
          )}
        </div>

        {isMobile ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {filtered.map(r => {
              const lc = levelColor(r.level);
              return (
                <div key={r.id} style={{ border: `1px solid ${C.border}`, borderRadius: 12, padding: '12px 14px', background: C.bg }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, cursor: 'pointer' }}
                      onClick={() => { sfx.click(); setSelectedRunner(r); setPage('runnerprofile'); }}>{r.name}</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <button onClick={e => openEdit(r, e)}
                        style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 8,
                          padding: '3px 10px', fontSize: 11, fontWeight: 600, color: C.muted, cursor: 'pointer', fontFamily: 'Inter' }}>
                        Edit
                      </button>
                      <span style={{
                        background: lc.bg, color: lc.color, border: `1px solid ${lc.border}`,
                        borderRadius: 999, padding: '2px 10px', fontSize: 12, fontWeight: 700,
                      }}>L{r.level}</span>
                    </div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px 16px', fontSize: 12, cursor: 'pointer' }}
                    onClick={() => { sfx.click(); setSelectedRunner(r); setPage('runnerprofile'); }}>
                    <div><span style={{ color: C.muted }}>ID </span><span style={{ fontFamily: 'monospace' }}>{r.id}</span></div>
                    <div><span style={{ color: C.muted }}>PB </span><span style={{ fontWeight: 600 }}>{r.pb}</span></div>
                    <div><span style={{ color: C.muted }}>Streak </span><span style={{ color: C.orange, fontWeight: 700 }}>{r.streak}🔥</span></div>
                    <div><span style={{ color: C.muted }}>Points </span><span style={{ fontWeight: 700 }}>{r.points.toLocaleString()}</span></div>
                    <div style={{ gridColumn: '1 / -1' }}><span style={{ color: C.muted }}>Group </span><span style={{ fontWeight: 600 }}>{rGroups(r).join(', ') || '—'}</span></div>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                  {['Runner ID', 'Name', 'Level', 'PB', 'Group', 'Streak', 'Points', ''].map(h => (
                    <th key={h} style={{ padding: '8px 12px', textAlign: 'left', fontWeight: 600, color: C.muted, fontSize: 12, whiteSpace: 'nowrap' }}>
                      {h}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => {
                  const lc = levelColor(r.level);
                  return (
                    <tr
                      key={r.id}
                      style={{ borderBottom: `1px solid ${C.border}`, cursor: 'pointer' }}
                      onClick={() => { sfx.click(); setSelectedRunner(r); setPage('runnerprofile'); }}
                    >
                      <td style={{ padding: '12px', fontFamily: 'monospace', fontSize: 12, color: C.muted }}>{r.id}</td>
                      <td style={{ padding: '12px', fontWeight: 600 }}>{r.name}</td>
                      <td style={{ padding: '12px' }}>
                        <span style={{
                          background: lc.bg, color: lc.color, border: `1px solid ${lc.border}`,
                          borderRadius: 999, padding: '2px 10px', fontSize: 12, fontWeight: 700,
                        }}>
                          L{r.level}
